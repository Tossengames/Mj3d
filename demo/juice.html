<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>سلسلة نصائح البرمجة</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Tajawal:wght@500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --code-font:'JetBrains Mono',monospace;
  --ui-font:'Tajawal',sans-serif;
  /* VS Code Dark+ inspired palette */
  --bg-editor:#1e1e1e;
  --bg-panel:#252526;
  --bg-titlebar:#323233;
  --border-col:#3c3c3c;
  --line-num:#5a5a5a;
  --tok-key:#c586c0;
  --tok-fn:#dcdcaa;
  --tok-str:#ce9178;
  --tok-num:#b5cea8;
  --tok-com:#6a9955;
  --tok-var:#9cdcfe;
  --tok-type:#4ec9b0;
  --tok-punc:#d4d4d4;
  --tok-op:#d4d4d4;
  --py-accent:#3776ab;
  --py-accent2:#ffd43b;
  --js-accent:#f7df1e;
  --js-accent2:#323330;
}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0c;direction:rtl;}
.ltr-block{direction:ltr;text-align:left;unicode-bidi:isolate;}

#bgCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;}
#vig{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse at 50% 46%,transparent 35%,rgba(0,0,0,0.55) 100%);}

#ui{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:0 6vw;gap:2.6vw;
}

/* Top label: language pill */
#label{
  position:fixed;top:0;left:0;right:0;
  display:flex;flex-direction:column;align-items:center;
  padding:7vw 6vw 2vw;z-index:11;
  opacity:0;transform:translateY(-16px);
  transition:opacity .5s ease,transform .5s ease;
}
#lang-pill{
  display:flex;align-items:center;gap:2vw;
  padding:1.8vw 4.2vw;
  border-radius:999px;
  background:rgba(30,30,30,0.72);
  border:1px solid rgba(255,255,255,0.14);
  backdrop-filter:blur(6px);
}
#lang-dot{width:2.2vw;height:2.2vw;max-width:11px;max-height:11px;border-radius:50%;flex-shrink:0;}
#lang-eyebrow{
  font-family:var(--ui-font);font-weight:800;
  font-size:clamp(0.72rem,3.2vw,0.95rem);
  letter-spacing:0.18em;text-transform:uppercase;
  color:#f0f0f0;
}
#tip-badge{
  margin-top:2.4vw;
  font-family:var(--ui-font);font-weight:600;
  font-size:clamp(0.62rem,2.7vw,0.8rem);
  letter-spacing:0.24em;text-transform:uppercase;
  color:rgba(255,255,255,0.5);
  opacity:0;transform:translateY(-8px);
  transition:opacity .45s ease,transform .45s ease;
}

/* Title + explanation block */
#content-wrap{display:flex;flex-direction:column;align-items:center;gap:2.2vw;width:100%;max-width:640px;}
.qtitle{
  font-family:var(--ui-font);font-weight:900;
  font-size:clamp(1.5rem,7vw,2.3rem);
  color:#fff;text-align:center;line-height:1.24;
  opacity:0;transform:translateY(26px);
  transition:opacity .55s ease,transform .6s cubic-bezier(.16,1,.3,1);
  text-shadow:0 3px 18px rgba(0,0,0,0.5);
  max-width:100%;
}
.qtitle.in{opacity:1;transform:translateY(0);}
.qexplain{
  font-family:var(--ui-font);font-weight:500;
  font-size:clamp(0.92rem,4vw,1.15rem);
  color:rgba(255,255,255,0.82);text-align:center;line-height:1.5;
  opacity:0;transform:translateY(18px);
  transition:opacity .5s ease,transform .55s cubic-bezier(.16,1,.3,1);
  max-width:92%;
}
.qexplain.in{opacity:1;transform:translateY(0);}

/* Code block, styled like a VS Code editor pane */
#code-panel{
  direction:ltr;text-align:left;
  width:100%;max-width:600px;
  border-radius:12px;
  background:var(--bg-editor);
  border:1px solid var(--border-col);
  box-shadow:0 20px 60px rgba(0,0,0,0.55),0 2px 0 rgba(255,255,255,0.03) inset;
  overflow:hidden;
  opacity:0;transform:translateY(24px) scale(0.97);
  transition:opacity .5s ease,transform .55s cubic-bezier(.16,1,.3,1);
}
#code-panel.in{opacity:1;transform:translateY(0) scale(1);}
#code-titlebar{
  direction:ltr;
  display:flex;align-items:center;gap:2vw;
  padding:2.4vw 3.6vw;
  background:var(--bg-titlebar);
  border-bottom:1px solid var(--border-col);
}
.tl-dot{width:2.6vw;height:2.6vw;max-width:12px;max-height:12px;border-radius:50%;}
#code-filename{
  margin-left:1.5vw;
  font-family:var(--code-font);font-weight:500;
  font-size:clamp(0.62rem,2.7vw,0.78rem);
  color:rgba(255,255,255,0.55);
}
#code-body{
  padding:3.4vw 3.8vw;
  font-family:var(--code-font);
  font-size:clamp(0.78rem,3.5vw,1rem);
  line-height:1.65;
  overflow-x:hidden;
  white-space:pre;
}
.code-line{direction:ltr;display:flex;gap:3.2vw;opacity:0;transform:translateX(-10px);transition:opacity .35s ease,transform .4s ease;}
.code-line.in{opacity:1;transform:translateX(0);}
.ln-num{color:var(--line-num);min-width:5.5vw;text-align:right;user-select:none;flex-shrink:0;}
.ln-code{white-space:pre-wrap;word-break:break-word;flex:1;}

/* token colors */
.tok-key{color:var(--tok-key);}
.tok-fn{color:var(--tok-fn);}
.tok-str{color:var(--tok-str);}
.tok-num{color:var(--tok-num);}
.tok-com{color:var(--tok-com);font-style:italic;}
.tok-var{color:var(--tok-var);}
.tok-type{color:var(--tok-type);}
.tok-punc{color:var(--tok-punc);}
.tok-def{color:var(--tok-fn);}

/* Output / terminal panel, sits directly under the code panel */
#output-panel{
  direction:ltr;text-align:left;
  width:100%;max-width:600px;
  border-radius:12px;
  background:#0c0c0e;
  border:1px solid var(--border-col);
  box-shadow:0 16px 44px rgba(0,0,0,0.5);
  overflow:hidden;
  margin-top:1.6vw;
  opacity:0;transform:translateY(18px) scale(0.97);
  transition:opacity .45s ease,transform .5s cubic-bezier(.16,1,.3,1);
}
#output-panel.in{opacity:1;transform:translateY(0) scale(1);}
#output-titlebar{
  direction:ltr;
  display:flex;align-items:center;gap:2vw;
  padding:1.8vw 3.6vw;
  background:#151517;
  border-bottom:1px solid var(--border-col);
}
#output-label{
  font-family:var(--ui-font);font-weight:700;
  font-size:clamp(0.62rem,2.7vw,0.78rem);
  letter-spacing:0.02em;
  color:#6fcf7d;
  display:flex;align-items:center;gap:1.6vw;
  direction:rtl;
}
#output-label::before{
  content:'▶';font-size:0.85em;color:#6fcf7d;
}
#output-body{
  padding:2.8vw 3.8vw 3.2vw;
  font-family:var(--code-font);
  font-size:clamp(0.74rem,3.3vw,0.94rem);
  line-height:1.6;
  color:#d4d4d4;
}
.output-line{direction:ltr;display:flex;gap:1.6vw;opacity:0;transform:translateX(-8px);transition:opacity .3s ease,transform .35s ease;}
.output-line.in{opacity:1;transform:translateX(0);}
.output-line::before{content:'›';color:#6fcf7d;flex-shrink:0;}

/* Bottom CTA */
#bottom{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;flex-direction:column;align-items:center;
  padding:3vw 6vw 8vw;z-index:11;
  opacity:0;transform:translateY(12px);
  transition:opacity .6s ease,transform .6s ease;
}
#cta{
  font-family:var(--ui-font);font-weight:700;
  font-size:clamp(0.68rem,3vw,0.88rem);
  letter-spacing:0.12em;text-transform:uppercase;
  color:rgba(255,255,255,0.55);
}

/* ───────── theme accent classes ───────── */
.s-python #lang-dot{background:linear-gradient(135deg,#3776ab,#ffd43b);}
.s-python #lang-pill{border-color:rgba(55,118,171,0.4);}
.s-python .qexplain{color:rgba(210,230,255,0.85);}
.s-python #code-panel{box-shadow:0 20px 60px rgba(55,118,171,0.25),0 2px 0 rgba(255,255,255,0.03) inset;}

.s-javascript #lang-dot{background:linear-gradient(135deg,#f7df1e,#f0db4f);}
.s-javascript #lang-pill{border-color:rgba(247,223,30,0.4);}
.s-javascript .qexplain{color:rgba(255,246,210,0.85);}
.s-javascript #code-panel{box-shadow:0 20px 60px rgba(247,223,30,0.18),0 2px 0 rgba(255,255,255,0.03) inset;}

/* Legibility scrim behind text zone */
#text-scrim{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:96vw;max-width:700px;height:56vh;
  border-radius:32px;
  opacity:0;
  transition:opacity .5s ease;
  pointer-events:none;
  filter:blur(1px);
  z-index:-1;
  background:radial-gradient(ellipse at center, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.28) 50%, rgba(0,0,0,0) 78%);
}
</style>
</head>
<body class="s-python">
<canvas id="bgCanvas"></canvas>
<div id="vig"></div>

<div id="label">
  <div id="lang-pill">
    <div id="lang-dot"></div>
    <div id="lang-eyebrow">بايثون</div>
  </div>
  <div id="tip-badge">نصيحة للمبتدئين</div>
</div>

<div id="ui">
  <div id="text-scrim"></div>
  <div id="content-wrap">
    <div class="qtitle" id="q-title"></div>
    <div class="qexplain" id="q-explain"></div>
    <div id="code-panel">
      <div id="code-titlebar">
        <div class="tl-dot" style="background:#ff5f57;"></div>
        <div class="tl-dot" style="background:#febc2e;"></div>
        <div class="tl-dot" style="background:#28c840;"></div>
        <div id="code-filename"></div>
      </div>
      <div id="code-body"></div>
    </div>
    <div id="output-panel">
      <div id="output-titlebar">
        <div id="output-label">النتيجة</div>
      </div>
      <div id="output-body"></div>
    </div>
  </div>
</div>

<div id="bottom"><div id="cta">احفظ هذا للرجوع إليه لاحقاً</div></div>

<script>
(()=>{
'use strict';

function safeR(v){return Math.max(0.01,isFinite(v)?v:0.01);}
function easeOutCubic(x){return 1-Math.pow(1-x,3);}

// ── CANVAS SETUP ──────────────────────────────────────────
const bgC=document.getElementById('bgCanvas');
const bgCtx=bgC.getContext('2d');
let W=window.innerWidth,H=window.innerHeight;
bgC.width=W;bgC.height=H;

let _t=0,_sceneStart=0,_styleIdx=0;

// ══════════════════════════════════════════════════════════
// CONTENT — alternating Python / JavaScript beginner tips.
// Each entry: title, short explanation, filename, and code lines.
// Code lines are plain strings; a lightweight tokenizer below
// applies syntax highlighting per-language at render time.
// ══════════════════════════════════════════════════════════
const CONTENT = [
  // ───────────── PYTHON ─────────────
  {lang:'python',file:'main.py',title:'المتغيرات لا تحتاج نوعاً محدداً',
   explain:'تتعرّف بايثون على نوع القيمة تلقائياً، يكفي أن تسند القيمة وتبدأ العمل.',
   code:['name = "Ada"','age = 36','is_coder = True','print(name, age, is_coder)'],
   output:['Ada 36 True']},
  {lang:'python',file:'loop.py',title:'حلقة for-in',
   explain:'يمكن المرور مباشرة على عناصر القائمة دون الحاجة إلى عدّاد.',
   code:['fruits = ["apple", "kiwi", "fig"]','for fruit in fruits:','    print(fruit)'],
   output:['apple','kiwi','fig']},
  {lang:'python',file:'fstring.py',title:'التنسيق باستخدام f-strings',
   explain:'أضف الحرف f قبل علامتي الاقتباس لتضمين المتغيرات داخل النص مباشرة.',
   code:['name = "Sam"','score = 92','print(f"{name} scored {score}%")'],
   output:['Sam scored 92%']},
  {lang:'python',file:'listcomp.py',title:'list comprehensions',
   explain:'يمكن بناء قائمة جديدة في سطر واحد بدلاً من حلقة متعددة الأسطر.',
   code:['nums = [1, 2, 3, 4, 5]','squares = [n * n for n in nums]','print(squares)'],
   output:['[1, 4, 9, 16, 25]']},
  {lang:'python',file:'dict.py',title:'القواميس تخزّن أزواج المفتاح والقيمة',
   explain:'تخيّل القاموس كصندوق موسوم؛ يمكن الوصول إلى القيمة عبر مفتاحها.',
   code:['user = {"name": "Lee", "age": 24}','print(user["name"])'],
   output:['Lee']},
  {lang:'python',file:'default.py',title:'القيم الافتراضية لمعاملات الدالة',
   explain:'أعطِ المعامل قيمة افتراضية ليتمكن المستدعي من تجاهله عند الحاجة.',
   code:['def greet(name, greeting="Hello"):','    print(f"{greeting}, {name}!")','','greet("Mia")'],
   output:['Hello, Mia!']},
  {lang:'python',file:'slice.py',title:'تقطيع القوائم والنصوص',
   explain:'استخدم [start:end] لاستخراج جزء محدد دون كتابة حلقة تكرار.',
   code:['word = "Python"','print(word[0:3])','print(word[-3:])'],
   output:['Pyt','hon']},
  {lang:'python',file:'unpack.py',title:'فك القيم المتعددة',
   explain:'يمكن إسناد عدة متغيرات دفعة واحدة من قائمة أو صف واحد.',
   code:['point = (4, 7)','x, y = point','print(x, y)'],
   output:['4 7']},
  {lang:'python',file:'ternary.py',title:'جملة الشرط في سطر واحد',
   explain:'يتيح التعبير الشرطي اختيار قيمة معينة ضمن سطر برمجي واحد فقط.',
   code:['age = 15','status = "adult" if age >= 18 else "minor"','print(status)'],
   output:['minor']},
  {lang:'python',file:'enumerate.py',title:'الدالة enumerate() تمنحك الفهرس',
   explain:'تغني enumerate عن العداد اليدوي، فهي تمنحك الفهرس والعنصر معاً.',
   code:['colors = ["red", "green", "blue"]','for i, c in enumerate(colors):','    print(i, c)'],
   output:['0 red','1 green','2 blue']},
  {lang:'python',file:'trycatch.py',title:'معالجة الأخطاء باستخدام try/except',
   explain:'ضع الكود المحفوف بالمخاطر داخل try، والتقط الخطأ بدلاً من توقف البرنامج.',
   code:['try:','    result = 10 / 0','except ZeroDivisionError:','    print("Cannot divide by zero")'],
   output:['Cannot divide by zero']},
  {lang:'python',file:'class.py',title:'صنف بسيط في بايثون',
   explain:'تُنفَّذ الدالة __init__ عند إنشاء الكائن، وتشير self إلى الكائن نفسه.',
   code:['class Dog:','    def __init__(self, name):','        self.name = name','','rex = Dog("Rex")','print(rex.name)'],
   output:['Rex']},
  {lang:'python',file:'lambda.py',title:'lambda: دوال مصغّرة بلا اسم',
   explain:'مفيدة للدوال القصيرة ذات الاستخدام الواحد، وغالباً ما تُستخدم مع الفرز أو التصفية.',
   code:['nums = [4, 1, 3, 2]','nums.sort(key=lambda n: -n)','print(nums)'],
   output:['[4, 3, 2, 1]']},
  {lang:'python',file:'walrus.py',title:'عامل الفظ walrus operator :=',
   explain:'يتيح إسناد قيمة واستخدامها ضمن التعبير نفسه في آن واحد.',
   code:['data = [1, 2, 3]','if (n := len(data)) > 2:','    print(f"List has {n} items")'],
   output:['List has 3 items']},
  {lang:'python',file:'zip.py',title:'الدالة zip() تدمج قائمتين',
   explain:'تتيح المرور على عدة قوائم في آن واحد، عنصراً مقابل عنصر.',
   code:['names = ["Al", "Bo"]','scores = [90, 85]','for n, s in zip(names, scores):','    print(n, s)'],
   output:['Al 90','Bo 85']},

  // ───────────── JAVASCRIPT ─────────────
  {lang:'javascript',file:'main.js',title:'استخدم let وconst بدلاً من var',
   explain:'استخدم const للقيم التي لا تتغيّر، وlet للقيم القابلة للتغيير.',
   code:['const name = "Ada";','let age = 36;','age = 37;','console.log(name, age);'],
   output:['Ada 37']},
  {lang:'javascript',file:'arrow.js',title:'الدوال السهمية Arrow Functions',
   explain:'طريقة مختصرة لكتابة الدوال، مفيدة بشكل خاص للدوال المكوّنة من سطر واحد.',
   code:['const square = (n) => n * n;','console.log(square(5));'],
   output:['25']},
  {lang:'javascript',file:'template.js',title:'القوالب النصية Template Literals',
   explain:'تتيح علامات الاقتباس الخلفية تضمين المتغيرات عبر ${} بدلاً من عملية الجمع.',
   code:['const name = "Sam";','const score = 92;','console.log(`${name} scored ${score}%`);'],
   output:['Sam scored 92%']},
  {lang:'javascript',file:'map.js',title:'الدالة Array.map() تحوّل القائمة',
   explain:'تعيد map مصفوفة جديدة دون التأثير على المصفوفة الأصلية إطلاقاً.',
   code:['const nums = [1, 2, 3, 4];','const doubled = nums.map(n => n * 2);','console.log(doubled);'],
   output:['[ 2, 4, 6, 8 ]']},
  {lang:'javascript',file:'destructure.js',title:'تفكيك الكائنات Destructuring',
   explain:'يمكن استخراج خصائص الكائن مباشرة إلى متغيرات مستقلة.',
   code:['const user = { name: "Lee", age: 24 };','const { name, age } = user;','console.log(name);'],
   output:['Lee']},
  {lang:'javascript',file:'default.js',title:'القيم الافتراضية للمعاملات',
   explain:'أعطِ الدالة قيمة افتراضية ليتمكن المستدعي من حذف أحد المعاملات.',
   code:['function greet(name, greeting = "Hello") {','  console.log(`${greeting}, ${name}!`);','}','greet("Mia");'],
   output:['Hello, Mia!']},
  {lang:'javascript',file:'ternary.js',title:'العامل الشرطي المختصر',
   explain:'صيغة مختصرة من if/else تعيد قيمة واحدة ضمن تعبير واحد.',
   code:['const age = 15;','const status = age >= 18 ? "adult" : "minor";','console.log(status);'],
   output:['minor']},
  {lang:'javascript',file:'spread.js',title:'عامل النشر Spread Operator ...',
   explain:'يوسّع عناصر مصفوفة أو كائن إلى عناصر مستقلة.',
   code:['const a = [1, 2];','const b = [...a, 3, 4];','console.log(b);'],
   output:['[ 1, 2, 3, 4 ]']},
  {lang:'javascript',file:'filter.js',title:'الدالة Array.filter() تنتقي العناصر',
   explain:'تحتفظ filter فقط بالعناصر التي تُعيد الدالة من أجلها القيمة true.',
   code:['const nums = [1, 2, 3, 4, 5];','const evens = nums.filter(n => n % 2 === 0);','console.log(evens);'],
   output:['[ 2, 4 ]']},
  {lang:'javascript',file:'trycatch.js',title:'معالجة الأخطاء باستخدام try/catch',
   explain:'التقط الخطأ المرمي بدلاً من السماح له بإيقاف البرنامج فجأة.',
   code:['try {','  JSON.parse("not valid json");','} catch (err) {','  console.log("Parsing failed");','}'],
   output:['Parsing failed']},
  {lang:'javascript',file:'sort.js',title:'الدالة Array.sort() تحتاج دالة مقارنة',
   explain:'من دونها تقارن sort الأرقام كنصوص، لذا استخدم دائماً (a, b) => a - b.',
   code:['const nums = [10, 1, 21, 2];','nums.sort((a, b) => a - b);','console.log(nums);'],
   output:['[ 1, 2, 10, 21 ]']},
  {lang:'javascript',file:'class.js',title:'صنف بسيط في جافاسكريبت',
   explain:'يُنفَّذ الباني constructor عند الإنشاء، وتشير this إلى الكائن نفسه.',
   code:['class Dog {','  constructor(name) {','    this.name = name;','  }','}','const rex = new Dog("Rex");','console.log(rex.name);'],
   output:['Rex']},
  {lang:'javascript',file:'optional.js',title:'التسلسل الاختياري ?.',
   explain:'يتيح الوصول الآمن إلى خاصية متداخلة دون توقف البرنامج إن كانت مفقودة.',

// ── LIGHTWEIGHT SYNTAX HIGHLIGHTER ──────────────────────────
const PY_KEYWORDS=new Set(['def','return','if','elif','else','for','while','in','import','from','as','class','try','except','finally','with','pass','break','continue','and','or','not','is','None','True','False','lambda','yield','global','nonlocal','assert','del','raise']);
const JS_KEYWORDS=new Set(['const','let','var','function','return','if','else','for','while','in','of','class','constructor','try','catch','finally','throw','new','this','async','await','import','export','from','default','break','continue','typeof','instanceof','null','undefined','true','false']);

function tokenizeLine(line,lang){
  const kw = lang==='python' ? PY_KEYWORDS : JS_KEYWORDS;
  let out='';
  let i=0;
  const n=line.length;
  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  while(i<n){
    const c=line[i];

    // comments
    if(lang==='python' && c==='#'){
      out+=`<span class="tok-com">${esc(line.slice(i))}</span>`;break;
    }
    if(lang==='javascript' && c==='/' && line[i+1]==='/'){
      out+=`<span class="tok-com">${esc(line.slice(i))}</span>`;break;
    }

    // strings
    if(c==='"'||c==="'"||c==='`'){
      const quote=c;let j=i+1;
      while(j<n && line[j]!==quote){ if(line[j]==='\\')j++; j++; }
      j=Math.min(j+1,n);
      out+=`<span class="tok-str">${esc(line.slice(i,j))}</span>`;
      i=j;continue;
    }

    // numbers
    if(/[0-9]/.test(c) && !/[A-Za-z_]/.test(line[i-1]||'')){
      let j=i;while(j<n && /[0-9.]/.test(line[j]))j++;
      out+=`<span class="tok-num">${esc(line.slice(i,j))}</span>`;
      i=j;continue;
    }

    // identifiers / keywords
    if(/[A-Za-z_$]/.test(c)){
      let j=i;while(j<n && /[A-Za-z0-9_$]/.test(line[j]))j++;
      const word=line.slice(i,j);
      const nextNonSpace=line.slice(j).match(/^\s*\(/);
      if(kw.has(word)){
        out+=`<span class="tok-key">${esc(word)}</span>`;
      }else if(nextNonSpace){
        out+=`<span class="tok-fn">${esc(word)}</span>`;
      }else if(/^[A-Z]/.test(word) && lang==='python'){
        out+=`<span class="tok-type">${esc(word)}</span>`;
      }else{
        out+=`<span class="tok-var">${esc(word)}</span>`;
      }
      i=j;continue;
    }

    // punctuation/operators
    out+=`<span class="tok-punc">${esc(c)}</span>`;
    i++;
  }
  return out;
}

// ── shared point-star helper (unused visually but kept minimal) ──
function star(ctx,cx,cy,outerR,points,innerRatio){
  points=points||5; innerRatio=innerRatio||0.382;
  const innerR=outerR*innerRatio;
  ctx.beginPath();
  for(let k=0;k<points*2;k++){
    const ang=(Math.PI/points)*k - Math.PI/2;
    const rad=(k%2===0)?outerR:innerR;
    const x=cx+Math.cos(ang)*rad,y=cy+Math.sin(ang)*rad;
    if(k===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  }
  ctx.closePath();ctx.fill();
}

// PYTHON background — deep blue/navy editor glow, faint grid,
// drifting "python-blue/yellow" orbs, soft code-line ghosting
// ════════════════════════════════════════════════════════
const PY_PARTICLES=[];
function initPython(w,h){
  PY_PARTICLES.length=0;
  for(let i=0;i<26;i++){
    PY_PARTICLES.push({
      x:Math.random()*w,y:Math.random()*h,
      r:1+Math.random()*2,
      vy:0.15+Math.random()*0.25,
      drift:(Math.random()-0.5)*0.3,
      hue:Math.random()<0.5?0:1, // 0 blue, 1 yellow
      tw:Math.random()*Math.PI*2,
    });
  }
}
function drawPython(ctx,t,w,h,st){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#0a1626');g.addColorStop(0.55,'#0d2038');g.addColorStop(1,'#060d18');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

  if(!PY_PARTICLES.length)initPython(w,h);
  const p=easeOutCubic(Math.min(1,st/1.0));

  // soft glow center
  const gx=w*0.5,gy=h*0.38;
  const rg=ctx.createRadialGradient(gx,gy,0,gx,gy,safeR(Math.max(w,h)*0.55));
  rg.addColorStop(0,'rgba(55,118,171,0.22)');rg.addColorStop(1,'rgba(55,118,171,0)');
  ctx.save();ctx.fillStyle=rg;ctx.fillRect(0,0,w,h);ctx.restore();

  // faint dot-grid, editor-minimap feel
  ctx.save();ctx.globalAlpha=0.05;ctx.fillStyle='#8fc8ff';
  const step=Math.max(24,w/18);
  for(let y=step*0.5;y<h;y+=step){
    for(let x=step*0.5;x<w;x+=step){
      ctx.beginPath();ctx.arc(x,y,1.1,0,Math.PI*2);ctx.fill();
    }
  }
  ctx.restore();

  // floating "falling code" particles — blue and gold accents
  PY_PARTICLES.forEach(pt=>{
    pt.y+=pt.vy;pt.x+=Math.sin(t*0.6+pt.tw)*pt.drift;
    if(pt.y>h+10){pt.y=-10;pt.x=Math.random()*w;}
    const tw=0.5+Math.sin(t*1.4+pt.tw)*0.5;
    ctx.save();ctx.globalAlpha=tw*0.55*p;
    ctx.fillStyle=pt.hue===0?'#5aa9e6':'#ffd43b';
    ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });

  // two large soft intertwined arcs, evoking the python logo motif abstractly
  ctx.save();ctx.globalAlpha=0.14*p;
  ctx.strokeStyle='#3776ab';ctx.lineWidth=Math.max(18,w*0.045);ctx.lineCap='round';
  ctx.beginPath();ctx.arc(w*0.36,h*0.28,Math.min(w,h)*0.24,0.6*Math.PI,1.7*Math.PI);ctx.stroke();
  ctx.strokeStyle='#ffd43b';
  ctx.beginPath();ctx.arc(w*0.64,h*0.5,Math.min(w,h)*0.24,1.6*Math.PI,2.7*Math.PI);ctx.stroke();
  ctx.restore();

  // scanline texture
  ctx.save();ctx.globalAlpha=0.04;ctx.fillStyle='#000';
  for(let y=0;y<h;y+=3){ctx.fillRect(0,y,w,1);}
  ctx.restore();
}

      tw:Math.random()*Math.PI*2,

}
function drawJavascript(ctx,t,w,h,st){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#1c1a06');g.addColorStop(0.55,'#211f0a');g.addColorStop(1,'#0e0d04');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);

  if(!JS_PARTICLES.length)initJavascript(w,h);
  const p=easeOutCubic(Math.min(1,st/1.0));

  const gx=w*0.5,gy=h*0.4;

  ctx.save();ctx.fillStyle=rg;ctx.fillRect(0,0,w,h);ctx.restore();

  // faint grid
  ctx.save();ctx.globalAlpha=0.05;ctx.strokeStyle='#f7df1e';ctx.lineWidth=1;
  const step=Math.max(28,w/14);
  for(let x=0;x<w;x+=step){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
  ctx.restore();

  // floating JS syntax glyphs drifting upward
  ctx.textAlign='center';ctx.textBaseline='middle';
  JS_PARTICLES.forEach(pt=>{
    pt.y-=pt.vy;pt.x+=Math.sin(t*0.5+pt.tw)*pt.drift;
    if(pt.y<-20){pt.y=h+20;pt.x=Math.random()*w;}
    const tw=0.4+Math.sin(t*1.3+pt.tw)*0.4;
    ctx.save();ctx.globalAlpha=tw*0.4*p;ctx.fillStyle='#f7df1e';
    ctx.font=`700 ${pt.size}px 'JetBrains Mono',monospace`;
    ctx.translate(pt.x,pt.y);ctx.rotate(Math.sin(t*0.4+pt.tw)*pt.rot);
    ctx.fillText(pt.glyph,0,0);
    ctx.restore();
  });

  // soft angled accent bar, like an editor sidebar highlight
  ctx.save();ctx.globalAlpha=0.1*p;ctx.fillStyle='#f7df1e';
  ctx.beginPath();
  ctx.moveTo(0,h*0.15);ctx.lineTo(w*0.08,h*0.15);ctx.lineTo(w*0.02,h*0.85);ctx.lineTo(0,h*0.85);
  ctx.closePath();ctx.fill();
  ctx.restore();

  ctx.save();ctx.globalAlpha=0.04;ctx.fillStyle='#000';
  for(let y=0;y<h;y+=3){ctx.fillRect(0,y,w,1);}
  ctx.restore();
}

// Single pool, shuffled, alternating python/javascript entries already
// baked into content order via strict alternation enforcement below.
let _pool=[],_pidx=0;
function buildAlternatingPool(){
  const py=CONTENT.filter(c=>c.lang==='python').sort(()=>Math.random()-0.5);
  const js=CONTENT.filter(c=>c.lang==='javascript').sort(()=>Math.random()-0.5);
  const out=[];
  const n=Math.max(py.length,js.length);
  // randomize which language starts, then strictly alternate
  const first=Math.random()<0.5?py:js, second=first===py?js:py;
  for(let i=0;i<n;i++){
    if(first[i])out.push(first[i]);
    if(second[i])out.push(second[i]);
  }
  return out;
}
function nextC(){
  if(!_pool.length||_pidx>=_pool.length){_pool=buildAlternatingPool();_pidx=0;}
  return _pool[_pidx++];
}

// simple HTML->plain segments renderer for the code lines composite draw:
// walks the child spans of a line and draws each with its token color
function drawCodeLineComposite(ctx,lineCodeEl,baseX,baseY,fontStr){
  ctx.font=fontStr;
  ctx.textAlign='left';ctx.textBaseline='middle';
  let x=baseX;
  const spans=lineCodeEl.querySelectorAll('span');
  if(spans.length===0){
    const txt=lineCodeEl.textContent||'';
    ctx.fillStyle='#d4d4d4';
    ctx.fillText(txt,x,baseY);
    return;
  }
  spans.forEach(sp=>{
    const cls=sp.className;
    let color='#d4d4d4';
    if(cls.includes('tok-key'))color='#c586c0';
    else if(cls.includes('tok-fn'))color='#dcdcaa';
    else if(cls.includes('tok-str'))color='#ce9178';
    else if(cls.includes('tok-num'))color='#b5cea8';
    else if(cls.includes('tok-com'))color='#6a9955';
    else if(cls.includes('tok-var'))color='#9cdcfe';
    else if(cls.includes('tok-type'))color='#4ec9b0';
    else if(cls.includes('tok-punc'))color='#d4d4d4';
    const txt=sp.textContent;
    ctx.fillStyle=color;
    if(cls.includes('tok-com'))ctx.font=fontStr.replace('normal','italic');
    ctx.fillText(txt,x,baseY);
    ctx.font=fontStr;
    x+=ctx.measureText(txt).width;
  });
}

    const sr=scrimEl.getBoundingClientRect();
    const sgrad=ctx.createRadialGradient(sr.left+sr.width/2,sr.top+sr.height/2,0,sr.left+sr.width/2,sr.top+sr.height/2,safeR(Math.max(sr.width,sr.height)*0.55));
    sgrad.addColorStop(0,'rgba(0,0,0,0.5)');sgrad.addColorStop(0.5,'rgba(0,0,0,0.28)');sgrad.addColorStop(1,'rgba(0,0,0,0)');
    ctx.save();ctx.globalAlpha=scrimOp;ctx.fillStyle=sgrad;ctx.fillRect(sr.left,sr.top,sr.width,sr.height);ctx.restore();
  }

  // label pill
  const labelEl=document.getElementById('label');
  const labelOp=parseFloat(window.getComputedStyle(labelEl).opacity)||0;
  if(labelOp>0.01){
    const pillEl=document.getElementById('lang-pill');
    const pr=pillEl.getBoundingClientRect();
    ctx.save();ctx.globalAlpha=labelOp;
    // pill background
    const radius=pr.height/2;
    ctx.fillStyle='rgba(30,30,30,0.72)';
    ctx.strokeStyle='rgba(255,255,255,0.14)';ctx.lineWidth=1;
    ctx.beginPath();
    if(ctx.roundRect)ctx.roundRect(pr.left,pr.top,pr.width,pr.height,radius);else ctx.rect(pr.left,pr.top,pr.width,pr.height);
    ctx.fill();ctx.stroke();
    // dot
    const dotEl=document.getElementById('lang-dot');
    const dr=dotEl.getBoundingClientRect();
    const dotGrad=ctx.createLinearGradient(dr.left,dr.top,dr.right,dr.bottom);
    if(currentId==='python'){dotGrad.addColorStop(0,'#3776ab');dotGrad.addColorStop(1,'#ffd43b');}
    else{dotGrad.addColorStop(0,'#f7df1e');dotGrad.addColorStop(1,'#f0db4f');}
    ctx.fillStyle=dotGrad;
    ctx.beginPath();ctx.arc(dr.left+dr.width/2,dr.top+dr.height/2,dr.width/2,0,Math.PI*2);ctx.fill();
    // eyebrow text
    const ebEl=document.getElementById('lang-eyebrow');
    const ebR=ebEl.getBoundingClientRect();
    const ebFs=parseFloat(window.getComputedStyle(ebEl).fontSize)||14;
    ctx.font=`800 ${ebFs}px 'Tajawal',sans-serif`;
    ctx.textAlign='right';ctx.textBaseline='middle';
    ctx.fillStyle=textCfg.pillFill;
    ctx.fillText(ebEl.textContent,ebR.left+ebR.width,ebR.top+ebR.height/2);
    ctx.restore();
  }

  // tip badge
  const tipEl=document.getElementById('tip-badge');
  const tipOp=parseFloat(window.getComputedStyle(tipEl).opacity)||0;
  if(tipOp>0.01){
    const tr=tipEl.getBoundingClientRect();
    const tfs=parseFloat(window.getComputedStyle(tipEl).fontSize)||12;
    ctx.save();ctx.globalAlpha=tipOp;
    ctx.font=`600 ${tfs}px 'Tajawal',sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.fillText(tipEl.textContent,tr.left+tr.width/2,tr.top+tr.height/2);
    ctx.restore();
  }

  // title
  const titleEl=document.getElementById('q-title');
  const titleOp=parseFloat(window.getComputedStyle(titleEl).opacity)||0;
  if(titleOp>0.01){
    const tr=titleEl.getBoundingClientRect();
    const tfs=parseFloat(window.getComputedStyle(titleEl).fontSize)||28;
    ctx.save();ctx.globalAlpha=titleOp;
    ctx.font=`900 ${tfs}px 'Tajawal',sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowBlur=16;
    drawOutlinedText(ctx,titleEl.textContent,tr.left+tr.width/2,tr.top+tr.height/2,textCfg.titleFill,'',0);
    ctx.restore();
  }

  // explain
  const explainEl=document.getElementById('q-explain');
  const explainOp=parseFloat(window.getComputedStyle(explainEl).opacity)||0;
  if(explainOp>0.01){
    const er=explainEl.getBoundingClientRect();
    const efs=parseFloat(window.getComputedStyle(explainEl).fontSize)||16;
    ctx.save();ctx.globalAlpha=explainOp;
    ctx.font=`500 ${efs}px 'Tajawal',sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=textCfg.explainFill;
    // explain may visually wrap; approximate by drawing as-is (single line assumption in composite)
    ctx.fillText(explainEl.textContent,er.left+er.width/2,er.top+er.height/2,er.width);
    ctx.restore();
  }

  // code panel
  const panelEl=document.getElementById('code-panel');
  const panelOp=parseFloat(window.getComputedStyle(panelEl).opacity)||0;
  if(panelOp>0.01){
    const pr=panelEl.getBoundingClientRect();
    ctx.save();ctx.globalAlpha=panelOp;
    // panel bg + border
    ctx.fillStyle='#1e1e1e';ctx.strokeStyle='#3c3c3c';ctx.lineWidth=1;
    const rad=12;
    ctx.beginPath();
    if(ctx.roundRect)ctx.roundRect(pr.left,pr.top,pr.width,pr.height,rad);else ctx.rect(pr.left,pr.top,pr.width,pr.height);
    ctx.fill();ctx.stroke();

    // titlebar
    const tbEl=document.getElementById('code-titlebar');
    const tbR=tbEl.getBoundingClientRect();
    ctx.fillStyle='#323233';
    ctx.beginPath();ctx.rect(pr.left,pr.top,pr.width,tbR.height);ctx.fill();
    ctx.strokeStyle='#3c3c3c';ctx.beginPath();ctx.moveTo(pr.left,pr.top+tbR.height);ctx.lineTo(pr.left+pr.width,pr.top+tbR.height);ctx.stroke();

    document.querySelectorAll('.tl-dot').forEach(dot=>{
      const dr=dot.getBoundingClientRect();
      ctx.fillStyle=window.getComputedStyle(dot).backgroundColor;
      ctx.beginPath();ctx.arc(dr.left+dr.width/2,dr.top+dr.height/2,dr.width/2,0,Math.PI*2);ctx.fill();
    });

    const fnEl=document.getElementById('code-filename');
    const fnR=fnEl.getBoundingClientRect();
    const fnFs=parseFloat(window.getComputedStyle(fnEl).fontSize)||12;
    ctx.font=`500 ${fnFs}px 'JetBrains Mono',monospace`;
    ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.fillText(fnEl.textContent,fnR.left,fnR.top+fnR.height/2);

    // code lines
    document.querySelectorAll('.code-line').forEach(row=>{
      const rop=parseFloat(window.getComputedStyle(row).opacity)||0;
      if(rop<0.01)return;
      const rr=row.getBoundingClientRect();
      const numEl=row.querySelector('.ln-num');
      const codeEl=row.querySelector('.ln-code');
      const nr=numEl.getBoundingClientRect();
      const cfs=parseFloat(window.getComputedStyle(codeEl).fontSize)||15;
      ctx.save();ctx.globalAlpha=rop;
      ctx.font=`400 ${cfs}px 'JetBrains Mono',monospace`;
      ctx.textAlign='right';ctx.textBaseline='middle';
      ctx.fillStyle='#5a5a5a';
      ctx.fillText(numEl.textContent,nr.left+nr.width,nr.top+nr.height/2);
      const cr=codeEl.getBoundingClientRect();
      drawCodeLineComposite(ctx,codeEl,cr.left,cr.top+cr.height/2,`normal 400 ${cfs}px 'JetBrains Mono',monospace`);
      ctx.restore();
    });
    ctx.restore();
  }

  // output / terminal panel
  const outPanelEl=document.getElementById('output-panel');
  const outPanelOp=parseFloat(window.getComputedStyle(outPanelEl).opacity)||0;
  if(outPanelOp>0.01){
    const opr=outPanelEl.getBoundingClientRect();
    ctx.save();ctx.globalAlpha=outPanelOp;
    ctx.fillStyle='#0c0c0e';ctx.strokeStyle='#3c3c3c';ctx.lineWidth=1;
    const orad=12;
    ctx.beginPath();
    if(ctx.roundRect)ctx.roundRect(opr.left,opr.top,opr.width,opr.height,orad);else ctx.rect(opr.left,opr.top,opr.width,opr.height);
    ctx.fill();ctx.stroke();

    const otbEl=document.getElementById('output-titlebar');
    const otbR=otbEl.getBoundingClientRect();
    ctx.fillStyle='#151517';
    ctx.beginPath();ctx.rect(opr.left,opr.top,opr.width,otbR.height);ctx.fill();
    ctx.strokeStyle='#3c3c3c';ctx.beginPath();ctx.moveTo(opr.left,opr.top+otbR.height);ctx.lineTo(opr.left+opr.width,opr.top+otbR.height);ctx.stroke();

    const olEl=document.getElementById('output-label');
    const olR=olEl.getBoundingClientRect();
    const olFs=parseFloat(window.getComputedStyle(olEl).fontSize)||12;
    ctx.font=`700 ${olFs}px 'Tajawal',sans-serif`;
    ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillStyle='#6fcf7d';
    ctx.fillText('▶ '+olEl.textContent,olR.left,olR.top+olR.height/2);

    document.querySelectorAll('.output-line').forEach(row=>{
      const rop=parseFloat(window.getComputedStyle(row).opacity)||0;
      if(rop<0.01)return;
      const rr=row.getBoundingClientRect();
      const rfs=parseFloat(window.getComputedStyle(row).fontSize)||15;
      ctx.save();ctx.globalAlpha=rop;
      ctx.font=`400 ${rfs}px 'JetBrains Mono',monospace`;
      ctx.textAlign='left';ctx.textBaseline='middle';
      ctx.fillStyle='#6fcf7d';
      ctx.fillText('›',rr.left,rr.top+rr.height/2);
      ctx.fillStyle='#d4d4d4';
      ctx.fillText(row.textContent,rr.left+rfs*1.3,rr.top+rr.height/2);
      ctx.restore();
    });
    ctx.restore();
  }

  // bottom cta
  const botEl=document.getElementById('bottom');
  const botOp=parseFloat(window.getComputedStyle(botEl).opacity)||0;
  if(botOp>0.01){
    const botR=botEl.getBoundingClientRect();
    ctx.save();ctx.globalAlpha=botOp*0.75;
    ctx.font=`700 ${Math.max(10,cW*0.021)}px 'Tajawal',sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    drawOutlinedText(ctx,'احفظ هذا للرجوع إليه لاحقاً',cW/2,botR.top+botR.height*0.4,'#ffffff','',0);
    ctx.restore();
  }
}

window.startRecordingFreshScene=function(fps){
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      window.startRecording(fps);
    });
  });
};
window.startRecording=function(fps){
  fps=fps||30;
  try{
    AC.resume().catch(()=>{});
    _compC=document.createElement('canvas');
    _compC.width=W;_compC.height=H;
    _compCtx=_compC.getContext('2d');
    window._recActive=true;
    window._recordingDone=false;
    _recChunks=[];
    _drawComposite();
    _recDest=AC.createMediaStreamDestination();
    master.connect(_recDest);
    const vs=_compC.captureStream(fps);
    const combined=new MediaStream([...vs.getVideoTracks(),..._recDest.stream.getAudioTracks()]);
    const mime=['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm'].find(m=>MediaRecorder.isTypeSupported(m))||'video/webm';
    _recorder=new MediaRecorder(combined,{mimeType:mime,videoBitsPerSecond:8000000,audioBitsPerSecond:192000});
    _recorder.ondataavailable=e=>{if(e.data&&e.data.size>0)_recChunks.push(e.data);};
    _recorder.onstop=()=>{
      window._recActive=false;
      try{master.disconnect(_recDest);}catch(e){}
      window._recordingBlob=new Blob(_recChunks,{type:'video/webm'});
      window._recordingDone=true;
    };
    _recorder.start(200);
    console.log('Recording started');
  }catch(e){console.error('startRecording error:',e);}
};
window.stopRecording=function(){try{if(_recorder&&_recorder.state!=='inactive')_recorder.stop();}catch(e){}};
window.forceFinalize=function(){
  window._recActive=false;
  if(_recChunks.length>0&&!window._recordingDone){
    window._recordingBlob=new Blob(_recChunks,{type:'video/webm'});
    window._recordingDone=true;
  }
};
window.getRecordingBase64=function(){
  return new Promise((resolve,reject)=>{
    const chk=()=>{
      if(!window._recordingBlob){setTimeout(chk,100);return;}
      const r=new FileReader();
      r.onloadend=()=>resolve(r.result.split(',')[1]);
      r.onerror=reject;
      r.readAsDataURL(window._recordingBlob);
    };chk();
  });
};

// ── LOOP ──────────────────────────────────────────────────
(function loop(){
  requestAnimationFrame(loop);
  _t+=0.016;
  const st=Math.max(0,_t-_sceneStart);
  STYLES[_styleIdx].draw(bgCtx,_t,W,H,st);
  if(window._recActive)_drawComposite();
})();

// ── BOOT ──────────────────────────────────────────────────
window.addEventListener('resize',()=>{
  W=window.innerWidth;H=window.innerHeight;
  bgC.width=W;bgC.height=H;
});
document.body.addEventListener('click',showScene);
document.body.addEventListener('touchend',e=>{e.preventDefault();showScene();},{passive:false});
showScene();
})();
