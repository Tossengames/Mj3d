<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOLE — 3D Shoe Studio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');
:root{--bg:#080808;--gold:#D4A843;--red:#FF2D2D;--dim:#444;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'DM Sans',sans-serif;color:#fff;cursor:none;}
#cur{position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
.cr{width:32px;height:32px;border:1px solid rgba(255,255,255,.3);border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);transition:all .35s cubic-bezier(.23,1,.32,1);}
.cd{width:5px;height:5px;background:#fff;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}
body.hov .cr{width:52px;height:52px;border-color:var(--gold);}
body.hov .cd{background:var(--gold);}
#c{position:fixed;inset:0;width:100%;height:100%;z-index:0;display:block;}
nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:1.4rem 2.5rem;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,rgba(8,8,8,.95),transparent);}
.logo{font-family:'Bebas Neue';font-size:2rem;letter-spacing:5px;}
.logo em{color:var(--gold);font-style:normal;}
.logo-sub{font-size:.5rem;letter-spacing:3px;text-transform:uppercase;color:var(--dim);margin-top:.1rem;}
.cart-btn{display:flex;align-items:center;gap:.55rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);padding:.5rem 1.3rem;border-radius:100px;font-size:.7rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:none;transition:background .2s;}
.cart-btn:hover{background:rgba(255,255,255,.1);}
.cart-n{background:var(--gold);color:#000;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:800;}
#panel{position:fixed;left:2.5rem;top:50%;transform:translateY(-50%);z-index:200;max-width:310px;}
@media(max-width:700px){#panel{left:1rem;right:1rem;max-width:100%;top:auto;bottom:11rem;transform:none;}}
.p-tag{font-size:.56rem;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;display:flex;align-items:center;gap:.8rem;}
.p-tag::before{content:'';width:22px;height:1px;background:var(--gold);}
.p-name{font-family:'Bebas Neue';font-size:clamp(3rem,5.5vw,5.8rem);line-height:.88;letter-spacing:1px;margin-bottom:.9rem;}
.p-name em{display:block;color:var(--gold);font-style:normal;}
.p-desc{font-size:.79rem;font-weight:300;line-height:1.8;color:rgba(255,255,255,.42);max-width:265px;margin-bottom:1.5rem;}
.p-price-row{display:flex;align-items:baseline;gap:.9rem;margin-bottom:1.4rem;}
.p-price{font-family:'Bebas Neue';font-size:2.6rem;letter-spacing:1px;line-height:1;}
.p-was{font-size:.85rem;color:var(--dim);text-decoration:line-through;}
.p-badge{font-size:.54rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;background:var(--red);color:#fff;padding:.2rem .6rem;border-radius:2px;}
.lbl{font-size:.54rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--dim);margin-bottom:.6rem;}
.swatches{display:flex;gap:.5rem;margin-bottom:1.4rem;}
.sw{width:22px;height:22px;border-radius:50%;cursor:none;outline:2px solid transparent;outline-offset:3px;transition:transform .2s,outline-color .2s;}
.sw:hover{transform:scale(1.1);}
.sw.on{outline-color:#fff;}
.sizes{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:1.5rem;}
.sz{min-width:38px;height:36px;padding:0 .5rem;border-radius:5px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);color:rgba(255,255,255,.4);font-size:.7rem;font-weight:600;cursor:none;font-family:'DM Sans',sans-serif;transition:all .2s;}
.sz:hover{border-color:rgba(255,255,255,.3);color:#fff;}
.sz.on{background:#fff;color:#000;border-color:#fff;}
.sz.oos{opacity:.14;pointer-events:none;text-decoration:line-through;}
.actions{display:flex;gap:.7rem;}
.btn-cart{flex:1;padding:.95rem 1.5rem;background:#fff;color:#000;border:none;border-radius:100px;font-size:.74rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:none;font-family:'DM Sans',sans-serif;transition:background .25s,transform .2s;}
.btn-cart:hover{background:var(--gold);transform:translateY(-2px);}
.btn-cart.ok{background:var(--gold);}
.btn-fav{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:1rem;cursor:none;transition:all .2s;}
.btn-fav:hover{background:rgba(255,255,255,.12);transform:translateY(-2px);}
.btn-fav.on{color:var(--red);}
#sel{position:fixed;right:1.8rem;top:50%;transform:translateY(-50%);z-index:200;display:flex;flex-direction:column;gap:.5rem;max-height:82vh;overflow-y:auto;padding:.3rem;scrollbar-width:none;}
#sel::-webkit-scrollbar{display:none;}
.pk{width:66px;height:66px;border-radius:10px;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.07);overflow:hidden;position:relative;cursor:none;transition:all .3s cubic-bezier(.23,1,.32,1);display:flex;align-items:center;justify-content:center;}
.pk:hover{border-color:rgba(255,255,255,.22);transform:scale(1.04);}
.pk.on{border-color:var(--gold);background:rgba(212,168,67,.1);transform:scale(1.08);}
.pk canvas{width:100%!important;height:100%!important;pointer-events:none;display:block;}
.pk-lbl{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.8));font-size:.37rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:rgba(255,255,255,.6);text-align:center;padding:.18rem;}
#hint{position:fixed;bottom:9rem;left:50%;transform:translateX(-50%);z-index:150;font-size:.58rem;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.18);pointer-events:none;display:flex;align-items:center;gap:.5rem;animation:hFade 4s 2s forwards;}
@keyframes hFade{to{opacity:0;}}
.hs{animation:hSpin 2s linear infinite;font-size:1rem;display:inline-block;}
@keyframes hSpin{to{transform:rotate(360deg);}}
#toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:#fff;color:#000;padding:.75rem 2rem;border-radius:100px;font-size:.73rem;font-weight:700;z-index:600;white-space:nowrap;transition:transform .4s cubic-bezier(.34,1.56,.64,1);}
#toast.show{transform:translateX(-50%) translateY(0);}
#load{position:fixed;inset:0;z-index:900;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;transition:opacity .8s;}
#load.done{opacity:0;pointer-events:none;}
.ll{font-family:'Bebas Neue';font-size:5rem;letter-spacing:8px;}
.ll em{color:var(--gold);font-style:normal;}
.lt{width:180px;height:1px;background:rgba(255,255,255,.1);overflow:hidden;border-radius:1px;}
.lf{height:100%;background:var(--gold);width:0;border-radius:1px;transition:width .04s linear;}
.ls{font-size:.56rem;letter-spacing:4px;text-transform:uppercase;color:var(--dim);}
</style>
</head>
<body>
<div id="cur"><div class="cr"></div><div class="cd"></div></div>
<div id="load">
  <div class="ll">S<em>O</em>LE</div>
  <div class="lt"><div class="lf" id="lf"></div></div>
  <div class="ls">Loading 3D Collection</div>
</div>
<canvas id="c"></canvas>
<nav>
  <div><div class="logo">S<em>O</em>LE</div><div class="logo-sub">3D Shoe Studio</div></div>
  <div class="cart-btn" id="cartBtn">Cart <div class="cart-n" id="cartN">0</div></div>
</nav>
<div id="panel">
  <div class="p-tag" id="pTag">Running</div>
  <div class="p-name" id="pName">AIR<em>NOVA X</em></div>
  <div class="p-desc" id="pDesc">Carbon plate runner. Ultralight knit upper.</div>
  <div class="p-price-row">
    <div class="p-price" id="pPrice">$189</div>
    <div class="p-was" id="pWas"></div>
    <span class="p-badge" id="pBadge" style="display:none"></span>
  </div>
  <div class="lbl">Colourway</div>
  <div class="swatches" id="swatches"></div>
  <div class="lbl">US Size</div>
  <div class="sizes" id="sizeRow"></div>
  <div class="actions">
    <button class="btn-cart" id="buyBtn">Add to Cart</button>
    <button class="btn-fav" id="favBtn">♡</button>
  </div>
</div>
<div id="hint"><span class="hs">✦</span>&nbsp;Drag to rotate</div>
<div id="sel"></div>
<div id="toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ── DATA ── */
const SHOES=[
  {id:0,n1:'AIR NOVA',n2:'X',tag:'Running',desc:'Carbon plate runner. Ultralight knit, nitrogen foam midsole. PB-ready.',
   price:189,was:null,badge:null,sizes:[6,7,7.5,8,8.5,9,9.5,10,11],oos:[7.5,9.5],
   cols:['#E0E0E0','#FF2D2D','#1A44DD','#111'],sole:'#111',mid:'#CCCCCC',upper:'#E0E0E0',accent:'#FF2D2D',lace:'#FFFFFF'},
  {id:1,n1:'STREET',n2:'CLASSIC',tag:'Lifestyle',desc:'Court icon reborn. Full-grain leather, vulcanised sole, forever in style.',
   price:145,was:180,badge:'SALE',sizes:[6,7,8,9,10,11,12],oos:[6,11],
   cols:['#FFFFF0','#111','#FFD000','#4490D9'],sole:'#E8E8E8',mid:'#FFFFFF',upper:'#FFFFF0',accent:'#FFD000',lace:'#FFFFFF'},
  {id:2,n1:'APEX',n2:'PRO X',tag:'Basketball',desc:'High ankle, carbon heel, explosive cushioning. Dominate every court.',
   price:225,was:null,badge:'NEW',sizes:[7,8,8.5,9,9.5,10,10.5,11,12],oos:[8],
   cols:['#FF6B00','#111','#FFFFFF','#8B0000'],sole:'#0A0A0A',mid:'#333',upper:'#FF6B00',accent:'#FFF',lace:'#FF6B00'},
  {id:3,n1:'TERRA',n2:'HIKE GT',tag:'Outdoor',desc:'Gore-Tex upper, Vibram outsole, all-terrain lugs. Built for the mountain.',
   price:198,was:null,badge:null,sizes:[6,7,8,9,10,11],oos:[],
   cols:['#5C7A3E','#8B4513','#2A2A2A','#D4A853'],sole:'#2A1A0A',mid:'#4A3020',upper:'#5C7A3E',accent:'#D4A853',lace:'#C8A870'},
  {id:4,n1:'VELOUR',n2:'EDITION',tag:'Luxury',desc:'Italian velour, gold hardware, memory foam. 500 pairs only.',
   price:495,was:null,badge:'LIMITED',sizes:[7,8,9,10,11],oos:[7,11],
   cols:['#4A0E6B','#1A1A1A','#E8C547','#2E0B4A'],sole:'#1A0A2A',mid:'#3A1A5A',upper:'#4A0E6B',accent:'#E8C547',lace:'#E8C547'},
  {id:5,n1:'ZERO',n2:'CLOUD',tag:'Training',desc:'180g knit trainer. Nitrogen foam adapts to your stride all day.',
   price:159,was:null,badge:null,sizes:[6,7,7.5,8,8.5,9,9.5,10,11,12],oos:[9],
   cols:['#87CEEB','#FFF','#FF69B4','#00CED1'],sole:'#D8D8FF',mid:'#FFF',upper:'#87CEEB',accent:'#FF69B4',lace:'#FFF'},
  {id:6,n1:'CARBON',n2:'DRIFT',tag:'Speed',desc:'Track-born street racer. Full carbon plate, split sole, reflective hits.',
   price:279,was:null,badge:'NEW',sizes:[7,8,9,10,11,12],oos:[],
   cols:['#111','#FF0000','#C0C0C0','#FFD700'],sole:'#060606',mid:'#1A1A1A',upper:'#111',accent:'#FF0000',lace:'#C0C0C0'},
  {id:7,n1:'RESORT',n2:'SLIP',tag:'Casual',desc:'Artisan woven upper, memory foam, natural rubber. Slip-on elevated.',
   price:98,was:130,badge:'SALE',sizes:[6,7,8,9,10,11],oos:[6],
   cols:['#D4A853','#FFF','#8B4513','#2C2C2C'],sole:'#F5E6C8',mid:'#EED8A8',upper:'#D4A853',accent:'#FFF',lace:null},
];

/* ── RENDERER ── */
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;
renderer.setClearColor(0x080808);
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x080808,.038);
const camera=new THREE.PerspectiveCamera(42,innerWidth/innerHeight,.1,200);
camera.position.set(0,.8,7.5);camera.lookAt(0,0,0);

/* Lights */
scene.add(new THREE.AmbientLight(0xffffff,.22));
const kl=new THREE.SpotLight(0xFFF8E8,3.5,22,Math.PI/5.5,.35);
kl.position.set(5,9,6);kl.castShadow=true;kl.shadow.mapSize.width=kl.shadow.mapSize.height=2048;scene.add(kl);
const fl=new THREE.DirectionalLight(0x8899FF,.45);fl.position.set(-6,3,4);scene.add(fl);
const rl=new THREE.DirectionalLight(0xFFFFFF,.6);rl.position.set(-2,5,-7);scene.add(rl);
const gl=new THREE.PointLight(0xD4A843,.5,10);gl.position.set(0,-2.5,0);scene.add(gl);

/* Floor */
const floor=new THREE.Mesh(new THREE.PlaneGeometry(60,60),
  new THREE.MeshStandardMaterial({color:0x0C0C0C,roughness:.08,metalness:.85,transparent:true,opacity:.7}));
floor.rotation.x=-Math.PI/2;floor.position.y=-2.4;floor.receiveShadow=true;scene.add(floor);

/* Particles */
const ptGeo=new THREE.BufferGeometry();
const ptArr=new Float32Array(400*3);
for(let i=0;i<400;i++){ptArr[i*3]=(Math.random()-.5)*50;ptArr[i*3+1]=(Math.random()-.5)*25;ptArr[i*3+2]=(Math.random()-.5)*25-8;}
ptGeo.setAttribute('position',new THREE.BufferAttribute(ptArr,3));
scene.add(new THREE.Points(ptGeo,new THREE.PointsMaterial({color:0x2A2A2A,size:.05,transparent:true,opacity:.55})));

/* ── SHOE BUILDER ── */
function col(hex){return new THREE.Color(hex);}
function mat(hex,r=.55,m=.05){return new THREE.MeshStandardMaterial({color:col(hex),roughness:r,metalness:m});}
function mesh(geo,material,px=0,py=0,pz=0,rx=0,ry=0,rz=0,group){
  const o=new THREE.Mesh(geo,material);
  o.position.set(px,py,pz);o.rotation.set(rx,ry,rz);
  o.castShadow=true;o.receiveShadow=true;
  group.add(o);return o;
}

function buildShoe(s){
  const g=new THREE.Group();
  const SM=mat(s.sole,.85,.04);
  const MM=mat(s.mid,.5,.05);
  const UM=mat(s.upper,.7,.02);
  const AM=mat(s.accent,.42,.12);
  const LM=s.lace?mat(s.lace,.3,.06):null;
  const midC=new THREE.Color(s.mid);midC.lerp(new THREE.Color('#FFFFFF'),.5);
  const lightMid=new THREE.MeshStandardMaterial({color:midC,roughness:.4,metalness:.05});
  const metalM=mat('#999',.2,.75);

  /* OUTSOLE — extruded shoe-shaped footprint */
  const sh=new THREE.Shape();
  sh.moveTo(-1.55,0);
  sh.quadraticCurveTo(-1.72,0,-1.72,.22);
  sh.quadraticCurveTo(-1.72,.55,-1.5,.55);
  sh.lineTo(1.25,.55);
  sh.quadraticCurveTo(1.72,.55,1.72,.22);
  sh.quadraticCurveTo(1.72,0,1.5,0);
  sh.lineTo(-1.55,0);
  const extGeo=new THREE.ExtrudeGeometry(sh,{depth:.52,bevelEnabled:true,bevelSize:.06,bevelThickness:.06,bevelSegments:4});
  const soleMesh=new THREE.Mesh(extGeo,SM);
  soleMesh.rotation.x=Math.PI/2;soleMesh.position.set(0,-1.45,-.26);
  soleMesh.castShadow=true;soleMesh.receiveShadow=true;g.add(soleMesh);

  /* Tread lugs on bottom */
  const lugC=new THREE.Color(s.sole);lugC.lerp(new THREE.Color('#000000'),.4);
  const lugM=new THREE.MeshStandardMaterial({color:lugC,roughness:.92,metalness:.03});
  for(let i=0;i<8;i++) mesh(new THREE.BoxGeometry(.18,.13,.44),lugM,-1.35+i*.38,-1.59,0,0,0,0,g);

  /* MIDSOLE — chunky foam layer */
  mesh(new THREE.BoxGeometry(3.2,.38,.6),MM,0,-1.1,0,0,0,0,g);
  /* heel stack */
  mesh(new THREE.BoxGeometry(1.1,.22,.58),lightMid,-1.05,-.96,0,0,0,0,g);

  /* UPPER — rear body: stretched sphere covering heel-to-midfoot */
  const upperRear=new THREE.Mesh(new THREE.SphereGeometry(1,28,18),UM);
  upperRear.scale.set(1.22,.68,.38);upperRear.position.set(-.28,-.48,0);upperRear.castShadow=true;g.add(upperRear);

  /* UPPER — toe box: forward flatter ellipsoid */
  const toePart=new THREE.Mesh(new THREE.SphereGeometry(.72,24,14),UM);
  toePart.scale.set(1.25,.54,.46);toePart.position.set(1.12,-.64,0);toePart.castShadow=true;g.add(toePart);

  /* UPPER — bridge connecting rear and toe */
  mesh(new THREE.BoxGeometry(1.1,.26,.6),UM,.32,-.45,0,0,0,0,g);

  /* HEEL COUNTER — back of heel in accent colour */
  const heelC=new THREE.Mesh(new THREE.SphereGeometry(.62,18,12),AM);
  heelC.scale.set(.72,.9,.46);heelC.position.set(-1.38,-.44,0);heelC.castShadow=true;g.add(heelC);
  /* heel back flat panel */
  mesh(new THREE.BoxGeometry(.07,.68,.5),AM,-1.68,-.44,0,0,0,0,g);

  /* ANKLE COLLAR — torus ring at opening */
  const collar=new THREE.Mesh(new THREE.TorusGeometry(.3,.072,10,32),mat(s.upper,.6));
  collar.scale.set(1,.65,.5);collar.position.set(-1.12,-.15,0);collar.rotation.y=.15;collar.castShadow=true;g.add(collar);

  /* TONGUE — angled flat panel */
  mesh(new THREE.BoxGeometry(.42,.7,.06),UM,-.32,-.07,.28,.28,0,0,g);
  /* tongue logo label */
  mesh(new THREE.BoxGeometry(.22,.13,.015),AM,-.32,.12,.3,.28,0,0,g);

  /* SIDE STRIPES — branded accent lines */
  mesh(new THREE.BoxGeometry(1.1,.075,.025),AM,.05,-.52,.31,0,0,-.07,g);
  mesh(new THREE.BoxGeometry(1.1,.075,.025),AM,.05,-.52,-.31,0,0,.07,g);

  /* LOGO PLATES */
  mesh(new THREE.BoxGeometry(.36,.22,.018),AM,.35,-.55,.31,0,0,0,g);
  mesh(new THREE.BoxGeometry(.36,.22,.018),AM,.35,-.55,-.31,0,0,0,g);

  /* LACES */
  if(LM){
    for(let i=0;i<5;i++){
      const lx=-.62+i*.22;const ly=-.26+i*.09;
      const loop=new THREE.Mesh(new THREE.TorusGeometry(.11,.016,6,18,Math.PI),LM);
      loop.position.set(lx,ly,.24);loop.rotation.set(Math.PI/2,0,Math.PI/2);loop.scale.y=.5;loop.castShadow=true;g.add(loop);
    }
    for(let side of[-1,1]){
      const lr=new THREE.Mesh(new THREE.CylinderGeometry(.016,.016,2.6,6),LM);
      lr.rotation.z=Math.PI/2;lr.rotation.y=side*.16;lr.position.set(-.2,-.22,side*.2);lr.castShadow=true;g.add(lr);
    }
  }

  /* EYELETS */
  for(let i=0;i<5;i++) for(let side of[-1,1]){
    const ey=new THREE.Mesh(new THREE.TorusGeometry(.028,.01,6,14),metalM);
    ey.position.set(-.62+i*.22,-.26+i*.09,side*.27);ey.rotation.x=Math.PI/2;ey.castShadow=true;g.add(ey);
  }

  /* FLOOR REFLECTION */
  const refl=new THREE.Mesh(new THREE.PlaneGeometry(3.8,.78),
    new THREE.MeshBasicMaterial({color:col(s.upper),transparent:true,opacity:.055,side:THREE.DoubleSide}));
  refl.rotation.x=Math.PI/2;refl.position.set(0,-2.38,0);g.add(refl);

  return g;
}

/* ── CURSOR ── */
const cur=document.getElementById('cur');
let cx=0,cy=0,tx=0,ty=0;
document.addEventListener('mousemove',e=>{tx=e.clientX;ty=e.clientY;});
(function mv(){cx+=(tx-cx)*.16;cy+=(ty-cy)*.16;cur.style.left=cx+'px';cur.style.top=cy+'px';requestAnimationFrame(mv);})();
function hov(on){on?document.body.classList.add('hov'):document.body.classList.remove('hov');}

/* ── STATE ── */
let curGrp=null,curIdx=0,curCol=0,selSize=null,cartCount=0;
let rotY=.3,rotX=.12,tRY=.3,tRX=.12,drag=false,lastX=0,autoRot=true;

canvas.addEventListener('mousedown',e=>{drag=true;lastX=e.clientX;autoRot=false;});
window.addEventListener('mousemove',e=>{if(drag){tRY+=(e.clientX-lastX)*.013;lastX=e.clientX;}});
window.addEventListener('mouseup',()=>{if(drag){drag=false;setTimeout(()=>autoRot=true,2600);}});
canvas.addEventListener('touchstart',e=>{drag=true;lastX=e.touches[0].clientX;autoRot=false;},{passive:true});
canvas.addEventListener('touchmove',e=>{if(drag){tRY+=(e.touches[0].clientX-lastX)*.015;lastX=e.touches[0].clientX;}},{passive:true});
canvas.addEventListener('touchend',()=>{drag=false;setTimeout(()=>autoRot=true,2600);});

function resize(){renderer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();}
resize();window.addEventListener('resize',resize);

/* ── LOAD SHOE ── */
function loadShoe(idx,colIdx,anim){
  const shoe=SHOES[idx];
  curIdx=idx;curCol=colIdx;selSize=null;
  if(curGrp){
    scene.remove(curGrp);
    curGrp.traverse(m=>{if(m.geometry)m.geometry.dispose();if(m.material){if(Array.isArray(m.material))m.material.forEach(x=>x.dispose());else m.material.dispose();}});
    curGrp=null;
  }
  const ci=colIdx||0;
  const c=shoe.cols[ci]||shoe.upper;
  const ac=shoe.cols[(ci+1)%shoe.cols.length]||shoe.accent;
  const grp=buildShoe({...shoe,upper:c,accent:ac});
  grp.position.set(0,.5,0);
  if(anim){
    grp.scale.set(.01,.01,.01);tRY=.3;tRX=.12;
    let p=0;(function si(){p=Math.min(p+.075,1);const s=1-Math.pow(1-p,3);grp.scale.set(s,s,s);if(p<1)requestAnimationFrame(si);})();
  }
  scene.add(grp);curGrp=grp;

  /* UI */
  document.getElementById('pTag').textContent=shoe.tag;
  document.getElementById('pName').innerHTML=shoe.n1+'<em>'+shoe.n2+'</em>';
  document.getElementById('pDesc').textContent=shoe.desc;
  document.getElementById('pPrice').textContent='$'+shoe.price;
  document.getElementById('pWas').textContent=shoe.was?'$'+shoe.was:'';
  const bd=document.getElementById('pBadge');
  if(shoe.badge){bd.textContent=shoe.badge;bd.style.display='inline-block';}else bd.style.display='none';

  const sw=document.getElementById('swatches');
  sw.innerHTML=shoe.cols.map((c,i)=>`<div class="sw${i===ci?' on':''}" data-ci="${i}" style="background:${c};box-shadow:inset 0 0 0 1px rgba(0,0,0,.25)"></div>`).join('');
  sw.querySelectorAll('.sw').forEach(el=>{
    el.addEventListener('click',()=>loadShoe(idx,+el.dataset.ci,false));
    el.addEventListener('mouseenter',()=>hov(true));el.addEventListener('mouseleave',()=>hov(false));
  });

  const sr=document.getElementById('sizeRow');
  sr.innerHTML=shoe.sizes.map(sz=>`<button class="sz${shoe.oos.includes(sz)?' oos':''}" data-sz="${sz}">${sz}</button>`).join('');
  sr.querySelectorAll('.sz:not(.oos)').forEach(b=>{
    b.addEventListener('click',()=>{sr.querySelectorAll('.sz').forEach(x=>x.classList.remove('on'));b.classList.add('on');selSize=+b.dataset.sz;});
    b.addEventListener('mouseenter',()=>hov(true));b.addEventListener('mouseleave',()=>hov(false));
  });

  document.querySelectorAll('.pk').forEach(p=>p.classList.remove('on'));
  const pk=document.querySelector(`.pk[data-i="${idx}"]`);
  if(pk)pk.classList.add('on');
}

/* ── THUMBS ── */
function buildThumb(cvs,shoe){
  const r=new THREE.WebGLRenderer({canvas:cvs,antialias:true,alpha:true});
  r.setPixelRatio(Math.min(devicePixelRatio,2));
  r.toneMapping=THREE.ACESFilmicToneMapping;r.toneMappingExposure=1.1;
  const sc=new THREE.Scene();
  const cam=new THREE.PerspectiveCamera(38,1,.1,50);
  cam.position.set(2.2,1.4,4.2);cam.lookAt(0,0,0);
  sc.add(new THREE.AmbientLight(0xffffff,.55));
  const dl=new THREE.DirectionalLight(0xffffff,2.2);dl.position.set(3,5,4);sc.add(dl);
  const m=buildShoe(shoe);m.scale.set(.38,.38,.38);m.position.y=-.15;sc.add(m);
  let t=0;
  (function loop(){
    requestAnimationFrame(loop);t+=.018;m.rotation.y=t*.5;
    const w=cvs.offsetWidth||66,h=cvs.offsetHeight||66;
    r.setSize(w,h);cam.aspect=w/h;cam.updateProjectionMatrix();
    r.render(sc,cam);
  })();
}

const selEl=document.getElementById('sel');
SHOES.forEach((shoe,i)=>{
  const wrap=document.createElement('div');
  wrap.className='pk'+(i===0?' on':'');wrap.dataset.i=i;
  wrap.innerHTML=`<canvas></canvas><div class="pk-lbl">${shoe.n1} ${shoe.n2}</div>`;
  wrap.addEventListener('click',()=>loadShoe(i,0,true));
  wrap.addEventListener('mouseenter',()=>hov(true));wrap.addEventListener('mouseleave',()=>hov(false));
  selEl.appendChild(wrap);
  setTimeout(()=>buildThumb(wrap.querySelector('canvas'),shoe),i*110);
});

/* ── ACTIONS ── */
document.querySelectorAll('button,.cart-btn,.pk,.sw,.sz').forEach(el=>{
  el.addEventListener('mouseenter',()=>hov(true));el.addEventListener('mouseleave',()=>hov(false));
});
document.getElementById('buyBtn').addEventListener('click',()=>{
  if(!selSize){showToast('👟 Please select a size');return;}
  cartCount++;document.getElementById('cartN').textContent=cartCount;
  const btn=document.getElementById('buyBtn');
  btn.textContent='✓ Added!';btn.classList.add('ok');
  setTimeout(()=>{btn.textContent='Add to Cart';btn.classList.remove('ok');},2000);
  showToast('✓ '+SHOES[curIdx].n1+' '+SHOES[curIdx].n2+' US'+selSize+' added');
});
let fav=false;
document.getElementById('favBtn').addEventListener('click',()=>{
  fav=!fav;const b=document.getElementById('favBtn');
  b.textContent=fav?'♥':'♡';b.classList.toggle('on',fav);
  showToast(fav?'♥ Saved':'Removed from wishlist');
});
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')loadShoe((curIdx+1)%SHOES.length,0,true);
  if(e.key==='ArrowLeft')loadShoe((curIdx-1+SHOES.length)%SHOES.length,0,true);
});

/* ── MAIN LOOP ── */
let T=0;
function loop(){
  requestAnimationFrame(loop);T+=.008;
  if(autoRot)tRY+=.006;
  rotY+=(tRY-rotY)*.06;rotX+=(tRX-rotX)*.06;
  if(curGrp){curGrp.rotation.y=rotY;curGrp.rotation.x=rotX;curGrp.position.y=.5+Math.sin(T*.75)*.065;}
  camera.position.x+=(Math.sin(T*.28)*.3-camera.position.x)*.022;
  camera.position.y+=(.8+Math.sin(T*.44)*.18-camera.position.y)*.022;
  camera.lookAt(0,0,0);
  renderer.render(scene,camera);
}

/* ── LOADING ── */
let pct=0;const lfEl=document.getElementById('lf');
const iv=setInterval(()=>{pct=Math.min(pct+1.8,90);lfEl.style.width=pct+'%';},35);
setTimeout(()=>{
  clearInterval(iv);lfEl.style.width='100%';
  setTimeout(()=>{loadShoe(0,0,true);loop();document.getElementById('load').classList.add('done');},380);
},1500);
</script>
