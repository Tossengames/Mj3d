<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOLE — 3D Shoe Collection</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');
:root{--bg:#080808;--gold:#D4A843;--red:#FF3333;--muted:#555;--surface:#111;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'DM Sans',sans-serif;color:#fff;cursor:none;}
#cur{position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
#cur-r{width:34px;height:34px;border:1px solid rgba(255,255,255,.4);border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);transition:width .35s,height .35s,border-color .3s;}
#cur-c{width:5px;height:5px;background:#fff;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}
body.hov #cur-r{width:58px;height:58px;border-color:var(--gold);}
body.hov #cur-c{background:var(--gold);}
#mainC{position:fixed;inset:0;width:100%;height:100%;z-index:0;}
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;justify-content:space-between;align-items:center;padding:1.4rem 2.5rem;background:linear-gradient(to bottom,rgba(8,8,8,.95),transparent);}
.logo{font-family:'Bebas Neue';font-size:1.9rem;letter-spacing:4px;}.logo em{color:var(--gold);font-style:normal;}
.logo-sub{font-size:.55rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-top:.1rem;}
.cart-pill{display:flex;align-items:center;gap:.5rem;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);padding:.5rem 1.2rem;border-radius:100px;font-size:.72rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:none;transition:background .2s;}
.cart-pill:hover{background:rgba(255,255,255,.12);}
.cart-n{background:var(--gold);color:#000;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:800;}
#info{position:fixed;left:2.5rem;top:50%;transform:translateY(-50%);z-index:200;max-width:320px;transition:opacity .5s;}
@media(max-width:700px){#info{left:1rem;right:1rem;max-width:100%;top:auto;bottom:11rem;transform:none;}}
.i-tag{font-size:.58rem;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;display:flex;align-items:center;gap:.8rem;}
.i-tag::before{content:'';width:24px;height:1px;background:var(--gold);}
.i-name{font-family:'Bebas Neue';font-size:clamp(3rem,5.5vw,5.5rem);line-height:.88;letter-spacing:1px;margin-bottom:.9rem;}
.i-name em{display:block;color:var(--gold);font-style:normal;}
.i-desc{font-size:.8rem;font-weight:300;line-height:1.75;color:rgba(255,255,255,.45);max-width:270px;margin-bottom:1.5rem;}
.i-price-row{display:flex;align-items:baseline;gap:.9rem;margin-bottom:1.4rem;}
.i-price{font-family:'Bebas Neue';font-size:2.6rem;letter-spacing:1px;line-height:1;}
.i-was{font-size:.85rem;color:var(--muted);text-decoration:line-through;}
.i-badge{font-size:.55rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;background:var(--red);color:#fff;padding:.2rem .6rem;border-radius:2px;}
.pick-lbl{font-size:.55rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem;}
.swatches{display:flex;gap:.5rem;margin-bottom:1.4rem;}
.sw{width:24px;height:24px;border-radius:50%;cursor:none;border:2px solid transparent;outline:2px solid transparent;transition:transform .2s,outline-color .2s;}
.sw:hover{transform:scale(1.1);}
.sw.on{outline:2px solid #fff;outline-offset:2px;}
.size-row{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:1.5rem;}
.sz{min-width:38px;height:36px;padding:0 .45rem;border-radius:5px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);color:rgba(255,255,255,.45);font-size:.7rem;font-weight:600;cursor:none;font-family:'DM Sans',sans-serif;transition:all .2s;}
.sz:hover{border-color:rgba(255,255,255,.3);color:#fff;}
.sz.on{background:#fff;color:#000;border-color:#fff;}
.sz.oos{opacity:.15;pointer-events:none;text-decoration:line-through;}
.actions{display:flex;gap:.7rem;}
.btn-add{flex:1;padding:.95rem 1.5rem;background:#fff;color:#000;border:none;border-radius:100px;font-size:.75rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:none;font-family:'DM Sans',sans-serif;transition:background .25s,transform .2s;}
.btn-add:hover{background:var(--gold);transform:translateY(-2px);}
.btn-add.ok{background:var(--gold);}
.btn-fav{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:1rem;cursor:none;transition:background .2s,transform .2s;}
.btn-fav:hover{background:rgba(255,255,255,.12);transform:translateY(-2px);}
.btn-fav.on{color:var(--red);}
#selector{position:fixed;right:1.8rem;top:50%;transform:translateY(-50%);z-index:200;display:flex;flex-direction:column;gap:.5rem;max-height:80vh;overflow-y:auto;padding:.3rem;scrollbar-width:none;}
#selector::-webkit-scrollbar{display:none;}
.pk{width:68px;height:68px;border-radius:12px;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.07);overflow:hidden;position:relative;cursor:none;transition:all .3s cubic-bezier(.23,1,.32,1);display:flex;align-items:center;justify-content:center;}
.pk:hover{border-color:rgba(255,255,255,.2);transform:scale(1.04);}
.pk.on{border-color:var(--gold);background:rgba(212,168,67,.1);transform:scale(1.08);}
.pk canvas{width:100%!important;height:100%!important;pointer-events:none;}
.pk-lbl{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.75));font-size:.38rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:rgba(255,255,255,.65);text-align:center;padding:.18rem;}
#sizePicker{position:fixed;right:1.8rem;bottom:2.5rem;z-index:200;display:none;}
#hint{position:fixed;bottom:9rem;left:50%;transform:translateX(-50%);z-index:150;font-size:.58rem;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.18);animation:hfade 3.5s 1.5s forwards;pointer-events:none;display:flex;align-items:center;gap:.5rem;}
@keyframes hfade{to{opacity:0;}}
.h-spin{display:inline-block;animation:hspin 2s linear infinite;font-size:.9rem;}
@keyframes hspin{to{transform:rotate(360deg);}}
#toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:#fff;color:#000;padding:.75rem 2rem;border-radius:100px;font-size:.73rem;font-weight:700;z-index:600;transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);}
#load{position:fixed;inset:0;z-index:900;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;transition:opacity .8s;}
#load.done{opacity:0;pointer-events:none;}
.load-logo{font-family:'Bebas Neue';font-size:5rem;letter-spacing:8px;color:#fff;}
.load-logo em{color:var(--gold);font-style:normal;}
.load-track{width:180px;height:1px;background:rgba(255,255,255,.1);overflow:hidden;border-radius:1px;}
.load-fill{height:100%;width:0;background:var(--gold);border-radius:1px;transition:width .05s linear;}
.load-sub{font-size:.58rem;letter-spacing:4px;text-transform:uppercase;color:var(--muted);}
</style>
</head>
<body>
<div id="cur"><div id="cur-r"></div><div id="cur-c"></div></div>
<div id="load"><div class="load-logo">S<em>O</em>LE</div><div class="load-track"><div class="load-fill" id="loadFill"></div></div><div class="load-sub">Loading 3D Collection</div></div>
<canvas id="mainC"></canvas>
<nav>
  <div><div class="logo">S<em>O</em>LE</div><div class="logo-sub">3D Shoe Collection</div></div>
  <div class="cart-pill" id="cartBtn">Cart <div class="cart-n" id="cartN">0</div></div>
</nav>
<div id="info">
  <div class="i-tag" id="iTag">Running</div>
  <div class="i-name" id="iName">AIR<em>NOVA X</em></div>
  <div class="i-desc" id="iDesc">Precision-engineered carbon plate runner.</div>
  <div class="i-price-row"><div class="i-price" id="iPrice">$189</div><div class="i-was" id="iWas"></div><span class="i-badge" id="iBadge" style="display:none"></span></div>
  <div class="pick-lbl">Colourway</div>
  <div class="swatches" id="swatches"></div>
  <div class="pick-lbl">US Size</div>
  <div class="size-row" id="sizeRow"></div>
  <div class="actions"><button class="btn-add" id="buyBtn">Add to Cart</button><button class="btn-fav" id="favBtn">♡</button></div>
</div>
<div id="hint"><span class="h-spin">✦</span> Drag to rotate</div>
<div id="selector"></div>
<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── DATA ──────────────────────────────────────────────
const SHOES=[
  {id:0,name:'AIR\nNOVA X',tag:'Running',desc:'Carbon plate runner with responsive foam midsole and knit upper. PB-ready.',price:189,was:null,badge:null,
   sizes:[6,7,7.5,8,8.5,9,9.5,10,11],oos:[7.5,9.5],
   cols:['#E0E0E0','#FF3333','#1A44DD','#1A1A1A'],sole:'#222',upper:'#E0E0E0',accent:'#FF3333',lace:'#fff'},
  {id:1,name:'STREET\nCLASSIC',tag:'Lifestyle',desc:'Court icon reborn. Full-grain leather, vulcanised sole, forever in style.',price:145,was:180,badge:'SALE',
   sizes:[6,7,8,9,10,11,12],oos:[6,11],
   cols:['#FFFEF7','#1A1A1A','#FFD000','#4A90D9'],sole:'#EFEFEF',upper:'#FFFEF7',accent:'#FFD000',lace:'#fff'},
  {id:2,name:'APEX\nPRO X',tag:'Basketball',desc:'High-cut ankle support, explosive cushioning, carbon heel plate. Dominate.',price:225,was:null,badge:'NEW',
   sizes:[7,8,8.5,9,9.5,10,10.5,11,12],oos:[8],
   cols:['#FF6B00','#1A1A1A','#ffffff','#8B0000'],sole:'#111',upper:'#FF6B00',accent:'#fff',lace:'#FF6B00'},
  {id:3,name:'TERRA\nHIKE GT',tag:'Outdoor',desc:'Gore-Tex upper, Vibram outsole, all-terrain lugs. Built for the mountain.',price:198,was:null,badge:null,
   sizes:[6,7,8,9,10,11],oos:[],
   cols:['#5C7A3E','#8B4513','#2A2A2A','#D4A853'],sole:'#2A1A0A',upper:'#5C7A3E',accent:'#D4A853',lace:'#C8A870'},
  {id:4,name:'VELOUR\nEDITION',tag:'Luxury',desc:'Italian velour, gold hardware, memory foam. Limited 500 pairs worldwide.',price:495,was:null,badge:'LIMITED',
   sizes:[7,8,9,10,11],oos:[7,11],
   cols:['#4A0E6B','#1A1A1A','#E8C547','#2E0B4A'],sole:'#1A0A2A',upper:'#4A0E6B',accent:'#E8C547',lace:'#E8C547'},
  {id:5,name:'ZERO\nCLOUD',tag:'Training',desc:'180g knit trainer. Nitrogen foam adapts to your stride all day.',price:159,was:null,badge:null,
   sizes:[6,7,7.5,8,8.5,9,9.5,10,11,12],oos:[9],
   cols:['#87CEEB','#ffffff','#FF69B4','#00CED1'],sole:'#E8E8FF',upper:'#87CEEB',accent:'#FF69B4',lace:'#fff'},
  {id:6,name:'CARBON\nDRIFT',tag:'Speed',desc:'Track-inspired street racer. Full carbon plate, split sole, reflective hits.',price:279,was:null,badge:'NEW',
   sizes:[7,8,9,10,11,12],oos:[],
   cols:['#1A1A1A','#FF0000','#C0C0C0','#FFD700'],sole:'#0A0A0A',upper:'#1A1A1A',accent:'#FF0000',lace:'#C0C0C0'},
  {id:7,name:'RESORT\nSLIP',tag:'Casual',desc:'Woven artisan upper, memory foam, natural rubber sole. Slip-on elevated.',price:98,was:130,badge:'SALE',
   sizes:[6,7,8,9,10,11],oos:[6],
   cols:['#D4A853','#fff','#8B4513','#2C2C2C'],sole:'#F5E6C8',upper:'#D4A853',accent:'#fff',lace:null},
];

// ── CURSOR ────────────────────────────────────────────
const cur=document.getElementById('cur');
let cx=0,cy=0,tx=0,ty=0;
document.addEventListener('mousemove',e=>{tx=e.clientX;ty=e.clientY;});
(function ac(){cx+=(tx-cx)*.16;cy+=(ty-cy)*.16;cur.style.left=cx+'px';cur.style.top=cy+'px';requestAnimationFrame(ac);})();
function hov(on){on?document.body.classList.add('hov'):document.body.classList.remove('hov');}

// ── MAIN RENDERER ─────────────────────────────────────
const canvas=document.getElementById('mainC');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.15;

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x080808);
scene.fog=new THREE.FogExp2(0x080808,.04);

const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,.1,200);
camera.position.set(0,.5,7);

// Lights
scene.add(new THREE.AmbientLight(0xffffff,.2));
const key=new THREE.SpotLight(0xfff8e8,3,20,Math.PI/5,.3);
key.position.set(4,8,5);key.castShadow=true;scene.add(key);
const fill=new THREE.DirectionalLight(0x8888ff,.4);fill.position.set(-5,2,3);scene.add(fill);
const rim=new THREE.DirectionalLight(0xffffff,.5);rim.position.set(-3,4,-6);scene.add(rim);
const ground=new THREE.PointLight(0xD4A843,.4,8);ground.position.set(0,-2,0);scene.add(ground);

// Floor
const floorM=new THREE.Mesh(new THREE.PlaneGeometry(40,40),new THREE.MeshStandardMaterial({color:0x0d0d0d,roughness:.15,metalness:.8,transparent:true,opacity:.7}));
floorM.rotation.x=-Math.PI/2;floorM.position.y=-2.2;floorM.receiveShadow=true;scene.add(floorM);

// Particles
const pGeo=new THREE.BufferGeometry();
const pPos=new Float32Array(300*3);
for(let i=0;i<300;i++){pPos[i*3]=(Math.random()-.5)*40;pPos[i*3+1]=(Math.random()-.5)*20;pPos[i*3+2]=(Math.random()-.5)*20-5;}
pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
scene.add(new THREE.Points(pGeo,new THREE.PointsMaterial({color:0x333333,size:.05,transparent:true,opacity:.5})));

// ── SHOE BUILDER ──────────────────────────────────────
function hex(h){return new THREE.Color(h);}
function mat(col,rough=.5,metal=.05){return new THREE.MeshStandardMaterial({color:hex(col),roughness:rough,metalness:metal});}

function buildShoe(s){
  const g=new THREE.Group();
  const sc=mat(s.sole,.8,.05);
  const uc=mat(s.upper,.7,.0);
  const ac=mat(s.accent,.45,.1);
  const lc=s.lace?mat(s.lace,.3,.05):null;
  const ml=mat(new THREE.Color(s.upper).lerp(new THREE.Color('#ffffff'),.55),.5);

  // Outsole
  const soleShape=new THREE.Shape();
  soleShape.moveTo(-1.6,.05);soleShape.lineTo(-1.7,-.05);soleShape.lineTo(-1.5,-.08);
  soleShape.lineTo(1.4,-.05);soleShape.lineTo(1.65,.1);soleShape.lineTo(1.4,.18);soleShape.lineTo(-1.4,.18);soleShape.closePath();
  const soleGeo=new THREE.ExtrudeGeometry(soleShape,{depth:.55,bevelEnabled:true,bevelSize:.06,bevelThickness:.06,bevelSegments:3});
  const sole=new THREE.Mesh(soleGeo,mat(s.sole,.75,.05));
  sole.rotation.x=Math.PI/2;sole.position.set(-.05,-1.4,-.275);sole.castShadow=true;g.add(sole);

  // Midsole
  const mid=new THREE.Mesh(new THREE.BoxGeometry(3.1,.32,.62),ml);
  mid.position.set(-.05,-1.12,0);mid.castShadow=true;g.add(mid);

  // Lugs
  for(let i=0;i<7;i++){
    const lug=new THREE.Mesh(new THREE.BoxGeometry(.2,.12,.52),mat(new THREE.Color(s.sole).lerp(new THREE.Color('#000'),.3),.9));
    lug.position.set(-1.3+i*.42,-1.55,0);g.add(lug);
  }

  // Upper body
  const up=new THREE.Mesh(new THREE.SphereGeometry(1,32,16),uc);
  up.scale.set(1.55,.58,.32);up.position.set(-.05,-.52,0);up.castShadow=true;g.add(up);

  // Toe
  const toe=new THREE.Mesh(new THREE.SphereGeometry(.52,20,14),uc);
  toe.scale.set(1.1,.7,.55);toe.position.set(1.18,-.68,0);g.add(toe);

  // Heel
  const heel=new THREE.Mesh(new THREE.SphereGeometry(.55,16,12),ac);
  heel.scale.set(.75,.9,.5);heel.position.set(-1.4,-.52,0);g.add(heel);

  // Collar
  const collar=new THREE.Mesh(new THREE.TorusGeometry(.28,.07,10,32),ac);
  collar.scale.set(1,.7,.5);collar.position.set(-1.1,-.2,0);collar.rotation.y=Math.PI/8;g.add(collar);

  // Stripes
  const s1=new THREE.Mesh(new THREE.BoxGeometry(1,.08,.34),mat(s.accent,.4,.15));
  s1.position.set(0,-.55,.17);s1.rotation.z=-.08;g.add(s1);

  // Logo plate
  const logo=new THREE.Mesh(new THREE.BoxGeometry(.35,.22,.02),mat(s.accent,.2,.3));
  logo.position.set(.3,-.58,.28);g.add(logo);

  // Tongue
  const tongue=new THREE.Mesh(new THREE.BoxGeometry(.38,.6,.06),uc);
  tongue.position.set(-.4,-.15,.24);tongue.rotation.x=.3;g.add(tongue);

  // Laces
  if(lc){
    for(let i=0;i<5;i++){
      const loop=new THREE.Mesh(new THREE.TorusGeometry(.12,.018,6,14,Math.PI),lc);
      loop.position.set(-.62+i*.18,-.3+i*.08,.22);
      loop.rotation.set(Math.PI/2,0,Math.PI/2);loop.scale.set(1,.5,1);g.add(loop);
    }
    const laceGeo=new THREE.CylinderGeometry(.018,.018,3,6);
    const lr=new THREE.Mesh(laceGeo,lc);lr.rotation.z=Math.PI/2;lr.rotation.y=.18;lr.position.set(-.35,-.25,.15);g.add(lr);
    const ll=new THREE.Mesh(laceGeo,lc);ll.rotation.z=Math.PI/2;ll.rotation.y=-.18;ll.position.set(-.35,-.25,-.15);g.add(ll);
  }

  // Eyelets
  for(let i=0;i<5;i++) for(let sv of [-1,1]){
    const ey=new THREE.Mesh(new THREE.TorusGeometry(.03,.012,6,12),mat(new THREE.Color(s.accent).lerp(new THREE.Color('#888'),.3),.2,.6));
    ey.position.set(-.62+i*.18,-.3+i*.08,sv*.22);ey.rotation.x=Math.PI/2;g.add(ey);
  }

  // Floor reflection
  const rf=new THREE.Mesh(new THREE.PlaneGeometry(3.5,.7),new THREE.MeshBasicMaterial({color:hex(s.upper),transparent:true,opacity:.06,side:THREE.DoubleSide}));
  rf.rotation.x=Math.PI/2;rf.position.set(-.05,-2.19,0);g.add(rf);

  g.traverse(m=>{if(m.isMesh){m.castShadow=true;m.receiveShadow=true;}});
  return g;
}

// ── STATE ─────────────────────────────────────────────
let curShoe=null,curIdx=0,curColIdx=0,selSize=null,cartCount=0;
let rotY=0,rotX=0,tRY=.3,tRX=.1,drag=false,lastX=0,autoRot=true;

// Drag
canvas.addEventListener('mousedown',e=>{drag=true;lastX=e.clientX;autoRot=false;});
window.addEventListener('mousemove',e=>{if(drag){tRY+=(e.clientX-lastX)*.012;lastX=e.clientX;}});
window.addEventListener('mouseup',()=>{if(drag){drag=false;setTimeout(()=>autoRot=true,2500);}});
canvas.addEventListener('touchstart',e=>{drag=true;lastX=e.touches[0].clientX;autoRot=false;},{passive:true});
canvas.addEventListener('touchmove',e=>{if(drag){tRY+=(e.touches[0].clientX-lastX)*.014;lastX=e.touches[0].clientX;}},{passive:true});
canvas.addEventListener('touchend',()=>{drag=false;setTimeout(()=>autoRot=true,2500);});

function resize(){renderer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();}
resize();window.addEventListener('resize',resize);

// ── LOAD SHOE ─────────────────────────────────────────
function loadShoe(idx,colIdx=0,anim=true){
  const shoe=SHOES[idx];
  curIdx=idx;curColIdx=colIdx;selSize=null;

  if(curShoe){scene.remove(curShoe);curShoe.traverse(m=>{if(m.geometry)m.geometry.dispose();if(m.material){if(Array.isArray(m.material))m.material.forEach(x=>x.dispose());else m.material.dispose();}});curShoe=null;}

  const colored={...shoe,
    sole:shoe.sole,
    upper:shoe.cols[colIdx]||shoe.upper,
    accent:shoe.cols[(colIdx+1)%shoe.cols.length]||shoe.accent,
    lace:shoe.lace
  };
  const grp=buildShoe(colored);
  grp.position.set(0,.5,0);
  scene.add(grp);curShoe=grp;

  if(anim){
    grp.scale.set(.01,.01,.01);
    let st=0;(function si(){st=Math.min(st+.07,1);const sv=1-Math.pow(1-st,3);grp.scale.set(sv,sv,sv);if(st<1)requestAnimationFrame(si);})();
    tRY=.3;tRX=.1;
  }

  // Update UI
  const parts=shoe.name.split('\n');
  document.getElementById('iName').innerHTML=parts[0]+'<em>'+parts[1]+'</em>';
  document.getElementById('iTag').textContent=shoe.tag;
  document.getElementById('iDesc').textContent=shoe.desc;
  document.getElementById('iPrice').textContent='$'+shoe.price;
  document.getElementById('iWas').textContent=shoe.was?'$'+shoe.was:'';
  const bd=document.getElementById('iBadge');
  if(shoe.badge){bd.textContent=shoe.badge;bd.style.display='inline-block';}else bd.style.display='none';

  // Swatches
  const sw=document.getElementById('swatches');
  sw.innerHTML=shoe.cols.map((c,i)=>`<div class="sw${i===colIdx?' on':''}" data-i="${i}" style="background:${c};box-shadow:inset 0 0 0 1px rgba(0,0,0,.2)"></div>`).join('');
  sw.querySelectorAll('.sw').forEach(s=>{
    s.addEventListener('click',()=>loadShoe(idx,+s.dataset.i,false));
    s.addEventListener('mouseenter',()=>hov(true));s.addEventListener('mouseleave',()=>hov(false));
  });

  // Sizes
  const sr=document.getElementById('sizeRow');
  sr.innerHTML=shoe.sizes.map(sz=>`<button class="sz${shoe.oos.includes(sz)?' oos':''}" data-sz="${sz}">${sz}</button>`).join('');
  sr.querySelectorAll('.sz:not(.oos)').forEach(b=>{
    b.addEventListener('click',()=>{sr.querySelectorAll('.sz').forEach(x=>x.classList.remove('on'));b.classList.add('on');selSize=+b.dataset.sz;});
    b.addEventListener('mouseenter',()=>hov(true));b.addEventListener('mouseleave',()=>hov(false));
  });

  // Selector highlight
  document.querySelectorAll('.pk').forEach(p=>p.classList.remove('on'));
  const pk=document.querySelector(`.pk[data-idx="${idx}"]`);
  if(pk)pk.classList.add('on');
}

// ── THUMBNAIL SCENES ──────────────────────────────────
function buildThumb(canvas,shoe){
  const r=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  r.setPixelRatio(Math.min(devicePixelRatio,2));
  r.toneMapping=THREE.ACESFilmicToneMapping;r.toneMappingExposure=1.1;
  const sc=new THREE.Scene();
  const cam=new THREE.PerspectiveCamera(40,1,.1,50);
  cam.position.set(2,1.5,4);cam.lookAt(0,0,0);
  sc.add(new THREE.AmbientLight(0xffffff,.5));
  const kl=new THREE.DirectionalLight(0xffffff,2);kl.position.set(3,5,4);sc.add(kl);
  const m=buildShoe(shoe);m.scale.set(.4,.4,.4);m.position.set(0,-.2,0);sc.add(m);
  let t=0;
  (function loop(){requestAnimationFrame(loop);t+=.018;m.rotation.y=t*.5;
    const w=canvas.offsetWidth||68,h=canvas.offsetHeight||68;
    r.setSize(w,h);cam.aspect=w/h;cam.updateProjectionMatrix();r.render(sc,cam);})();
}

// Build selector
const sel=document.getElementById('selector');
SHOES.forEach((shoe,i)=>{
  const wrap=document.createElement('div');
  wrap.className='pk'+(i===0?' on':'');wrap.dataset.idx=i;
  wrap.innerHTML=`<canvas></canvas><div class="pk-lbl">${shoe.name.replace('\n',' ')}</div>`;
  wrap.addEventListener('click',()=>loadShoe(i,0,true));
  wrap.addEventListener('mouseenter',()=>hov(true));wrap.addEventListener('mouseleave',()=>hov(false));
  sel.appendChild(wrap);
  const c=wrap.querySelector('canvas');
  setTimeout(()=>buildThumb(c,shoe),i*100);
});

// ── BUY / FAV ─────────────────────────────────────────
document.getElementById('buyBtn').addEventListener('click',()=>{
  if(!selSize){toast('👟 Please select a size');return;}
  cartCount++;document.getElementById('cartN').textContent=cartCount;
  const btn=document.getElementById('buyBtn');
  btn.textContent='✓ Added!';btn.classList.add('ok');
  setTimeout(()=>{btn.textContent='Add to Cart';btn.classList.remove('ok');},2000);
  toast('✓ '+SHOES[curIdx].name.replace('\n',' ')+' US'+selSize+' added');
});
let fav=false;
document.getElementById('favBtn').addEventListener('click',()=>{
  fav=!fav;const b=document.getElementById('favBtn');
  b.textContent=fav?'♥':'♡';b.classList.toggle('on',fav);
  toast(fav?'♥ Saved to wishlist':'Removed from wishlist');
});
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}

// Hover on interactive els
document.querySelectorAll('button,.cart-pill,.pk,.sw,.sz').forEach(el=>{
  el.addEventListener('mouseenter',()=>hov(true));el.addEventListener('mouseleave',()=>hov(false));
});

// Keys
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')loadShoe((curIdx+1)%SHOES.length,0,true);
  if(e.key==='ArrowLeft')loadShoe((curIdx-1+SHOES.length)%SHOES.length,0,true);
});

// ── ANIMATE LOOP ──────────────────────────────────────
let t=0;
function animate(){
  requestAnimationFrame(animate);t+=.008;
  if(autoRot)tRY+=.006;
  rotY+=(tRY-rotY)*.06;rotX+=(tRX-rotX)*.06;
  if(curShoe){curShoe.rotation.y=rotY;curShoe.rotation.x=rotX;curShoe.position.y=.5+Math.sin(t*.8)*.06;}
  camera.position.x+=( Math.sin(t*.3)*.3-camera.position.x)*.02;
  camera.position.y+=(.5+Math.sin(t*.5)*.15-camera.position.y)*.02;
  camera.lookAt(0,0,0);
  renderer.render(scene,camera);
}

// ── LOADING BAR + INIT ────────────────────────────────
let pct=0;
const loadFill=document.getElementById('loadFill');
const loadInterval=setInterval(()=>{
  pct=Math.min(pct+2,90);
  loadFill.style.width=pct+'%';
},40);

setTimeout(()=>{
  clearInterval(loadInterval);
  loadFill.style.width='100%';
  setTimeout(()=>{
    loadShoe(0,0,true);
    animate();
    document.getElementById('load').classList.add('done');
  },400);
},1400);
</script>
