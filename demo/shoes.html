<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOLE — 3D Shoe Showcase</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap');
:root{--bg:#080808;--gold:#D4A843;--red:#E8302A;--muted:rgba(255,255,255,.38);}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Inter',sans-serif;color:#fff;cursor:none;}
#cur{position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
#cur-c{width:12px;height:12px;background:#fff;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);transition:width .25s,height .25s,background .25s;}
#cur-r{width:40px;height:40px;border:1px solid rgba(255,255,255,.4);border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);transition:width .3s,height .3s,border-color .3s;}
.chov #cur-r{width:64px;height:64px;border-color:var(--gold);}
.chov #cur-c{background:var(--gold);}
.cdrag #cur-c{width:6px;height:6px;}
.cdrag #cur-r{width:28px;height:28px;}
#c{position:fixed;inset:0;width:100%;height:100%;z-index:0;}
nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:1.8rem 3rem;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,rgba(8,8,8,.95) 0%,transparent 100%);}
.logo{font-family:'Bebas Neue';font-size:2.2rem;letter-spacing:5px;}
.logo em{color:var(--gold);font-style:normal;}
.nav-sub{font-size:.6rem;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-top:-.3rem;}
.nav-r{display:flex;align-items:center;gap:2rem;}
.nav-btn{display:flex;align-items:center;gap:.6rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);padding:.55rem 1.4rem;border-radius:100px;font-size:.72rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:none;transition:background .2s;}
.nav-btn:hover{background:rgba(255,255,255,.12);}
.cart-dot{width:18px;height:18px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:800;color:#000;}
#info{position:fixed;left:3rem;top:50%;transform:translateY(-50%);z-index:200;max-width:340px;opacity:0;animation:fadeUp .7s .3s forwards;}
@keyframes fadeUp{from{opacity:0;transform:translateY(calc(-50% + 20px))}to{opacity:1;transform:translateY(-50%)}}
.info-tag{font-size:.6rem;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:1.2rem;display:flex;align-items:center;gap:.8rem;}
.info-tag::before{content:'';width:28px;height:1px;background:var(--gold);}
.info-name{font-family:'Bebas Neue';font-size:clamp(3.5rem,5.5vw,6rem);line-height:.88;letter-spacing:1px;margin-bottom:1.2rem;}
.info-name em{display:block;color:var(--gold);font-style:normal;}
.info-desc{font-size:.82rem;font-weight:300;line-height:1.75;color:rgba(255,255,255,.5);max-width:280px;margin-bottom:1.8rem;}
.info-price-row{display:flex;align-items:baseline;gap:1rem;margin-bottom:.3rem;}
.info-price{font-family:'Bebas Neue';font-size:3rem;letter-spacing:1px;line-height:1;}
.info-was{font-size:.9rem;color:var(--muted);text-decoration:line-through;}
.info-save{font-size:.6rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;background:var(--red);color:#fff;padding:.2rem .6rem;border-radius:2px;}
.info-rating{display:flex;align-items:center;gap:.5rem;margin-bottom:1.8rem;font-size:.72rem;color:var(--muted);}
.stars{color:var(--gold);letter-spacing:1px;}
.pick-label{font-size:.58rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:.7rem;}
.swatches{display:flex;gap:.5rem;margin-bottom:1.6rem;}
.sw{width:26px;height:26px;border-radius:50%;cursor:none;border:2px solid transparent;outline:2px solid transparent;transition:transform .2s,outline-color .2s;}
.sw:hover{transform:scale(1.1);}
.sw.on{outline:2px solid #fff;outline-offset:2px;}
.size-row{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1.8rem;}
.sz{min-width:40px;height:38px;padding:0 .5rem;border-radius:6px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);font-size:.72rem;font-weight:600;cursor:none;font-family:'Inter',sans-serif;transition:all .2s;}
.sz:hover{border-color:rgba(255,255,255,.3);color:#fff;}
.sz.on{background:#fff;color:#000;border-color:#fff;}
.sz.oos{opacity:.18;pointer-events:none;text-decoration:line-through;}
.actions{display:flex;gap:.75rem;}
.btn-buy{flex:1;padding:1rem 1.5rem;background:#fff;color:#000;border:none;border-radius:100px;font-size:.78rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:none;font-family:'Inter',sans-serif;transition:background .25s,transform .2s,box-shadow .2s;}
.btn-buy:hover{background:var(--gold);transform:translateY(-2px);box-shadow:0 12px 32px rgba(212,168,67,.3);}
.btn-buy.added{background:var(--gold);}
.btn-fav{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;font-size:1.1rem;cursor:none;transition:background .2s,transform .2s;}
.btn-fav:hover{background:rgba(255,255,255,.14);transform:translateY(-2px);}
.btn-fav.on{color:var(--red);}
#picker{position:fixed;bottom:2.5rem;left:50%;transform:translateX(-50%);z-index:200;display:flex;gap:.9rem;align-items:center;background:rgba(8,8,8,.75);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:100px;padding:.6rem .9rem;}
.pk{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);overflow:hidden;position:relative;cursor:none;transition:all .3s cubic-bezier(.23,1,.32,1);display:flex;align-items:center;justify-content:center;}
.pk:hover{border-color:rgba(255,255,255,.3);transform:translateY(-4px);}
.pk.on{border-color:var(--gold);background:rgba(212,168,67,.12);transform:translateY(-6px);}
.pk canvas{width:100%!important;height:100%!important;pointer-events:none;}
.pk-name{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.8));font-size:.34rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:rgba(255,255,255,.7);text-align:center;padding:.15rem .1rem;}
.pk-badge{position:absolute;top:.15rem;right:.15rem;width:14px;height:14px;border-radius:50%;font-size:.38rem;font-weight:800;display:flex;align-items:center;justify-content:center;}
#rhint{position:fixed;bottom:10rem;left:50%;transform:translateX(-50%);z-index:150;display:flex;align-items:center;gap:.6rem;font-size:.62rem;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.2);animation:rhfade 3s 2s forwards;pointer-events:none;}
@keyframes rhfade{to{opacity:0}}
.rh-icon{font-size:1.2rem;animation:rhsway 1.5s ease-in-out infinite;}
@keyframes rhsway{0%,100%{transform:rotate(-15deg)}50%{transform:rotate(15deg)}}
#toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:#fff;color:#000;padding:.8rem 2rem;border-radius:100px;font-size:.75rem;font-weight:700;z-index:600;transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);}
#load{position:fixed;inset:0;z-index:900;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;transition:opacity .7s;}
#load.done{opacity:0;pointer-events:none;}
.load-logo{font-family:'Bebas Neue';font-size:5rem;letter-spacing:8px;}
.load-logo em{color:var(--gold);font-style:normal;}
.load-track{width:180px;height:1px;background:rgba(255,255,255,.1);}
.load-fill{height:100%;background:var(--gold);width:0;animation:lfill 1.8s ease forwards;}
@keyframes lfill{to{width:100%}}
.load-sub{font-size:.6rem;letter-spacing:4px;text-transform:uppercase;color:var(--muted);}
@media(max-width:700px){#cur{display:none;}body{cursor:auto;}#info{left:1rem;right:1rem;max-width:100%;top:auto;bottom:12rem;transform:none;animation:none;opacity:1;}.info-name{font-size:2.5rem;}nav{padding:1rem 1.2rem;}#picker{gap:.5rem;padding:.4rem .6rem;}.pk{width:50px;height:50px;}}
</style>
</head>
<body>
<div id="cur"><div id="cur-r"></div><div id="cur-c"></div></div>
<div id="load"><div class="load-logo">S<em>O</em>LE</div><div class="load-track"><div class="load-fill"></div></div><div class="load-sub">Initialising 3D Collection</div></div>
<canvas id="c"></canvas>
<nav>
  <div><div class="logo">S<em>O</em>LE</div><div class="nav-sub">3D Shoe Collection</div></div>
  <div class="nav-r"><div class="nav-btn" id="cartBtn">Cart <div class="cart-dot" id="cartDot">0</div></div></div>
</nav>
<div id="info">
  <div class="info-tag" id="iTag">Running</div>
  <div class="info-name" id="iName">AIR<em>NOVA X</em></div>
  <div class="info-desc" id="iDesc">Precision-engineered carbon plate runner with responsive foam midsole and breathable knit upper.</div>
  <div class="info-price-row"><div class="info-price" id="iPrice">$189</div><div class="info-was" id="iWas"></div><div class="info-save" id="iSave" style="display:none"></div></div>
  <div class="info-rating"><span class="stars">★★★★★</span><span id="iRating">4.9 · 2,841 reviews</span></div>
  <div class="pick-label">Colourway</div>
  <div class="swatches" id="swatches"></div>
  <div class="pick-label">Size (US)</div>
  <div class="size-row" id="sizeRow"></div>
  <div class="actions"><button class="btn-buy" id="buyBtn">Add to Cart</button><button class="btn-fav" id="favBtn">♡</button></div>
</div>
<div id="rhint"><span class="rh-icon">✦</span> Drag to rotate</div>
<div id="picker"></div>
<div id="toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
